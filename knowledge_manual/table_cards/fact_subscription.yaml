sql_patterns:
  active_subscriptions_for_month:
    description: 按完整月份识别有效订阅数。
    sql: "SELECT\n COUNT(DISTINCT sub_id) AS active_subscription_count\nFROM fact_subscription\nWHERE start_date <= DATE '2025-10-31'\n AND end_date >= DATE '2025-10-01'\n AND status = 'active';"
  mrr_by_plan_tier:
    description: 按套餐统计订阅数与 MRR。
    sql: "SELECT\n plan_tier,\n COUNT(DISTINCT sub_id) AS subscription_count,\n SUM(mrr) AS total_mrr\nFROM fact_subscription\nGROUP BY plan_tier\nORDER BY total_mrr DESC, plan_tier;"
  subscription_counts_by_status:
    description: 按订阅状态统计订阅数。
    sql: "SELECT\n status,\n COUNT(DISTINCT sub_id) AS subscription_count\nFROM fact_subscription\nGROUP BY status\nORDER BY subscription_count DESC, status;"
