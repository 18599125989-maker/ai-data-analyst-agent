prompt_summary: >
  fact_campaign_attribution 是营销归因触点事实表，一行代表一次用户与 campaign 的触点记录，
  当前验证显示 user_id + campaign_id + touch_type + touch_at 唯一。
  常用路径包括 user_id -> dim_user -> dim_tenant，以及 campaign_id -> fact_campaign。
  统计触点数使用 COUNT(*)，统计用户数使用 COUNT(DISTINCT user_id)，统计 campaign 数使用 COUNT(DISTINCT campaign_id)。
  转化数使用 SUM(is_converted)，转化率使用 AVG(is_converted)。
  关键陷阱是不要把 COUNT(*) 当作用户数或 campaign 数，不要把 touch_type 当成 metric，并且 2026-04 可能是不完整月份。

