sql_patterns:
  attribution_count_by_touch_type: |
    SELECT
        touch_type,
        COUNT(*) AS attribution_record_count
    FROM fact_campaign_attribution
    GROUP BY touch_type
    ORDER BY attribution_record_count DESC, touch_type;
  conversion_rate_by_touch_type: |
    SELECT
        touch_type,
        COUNT(*) AS attribution_record_count,
        SUM(is_converted) AS converted_touch_count,
        AVG(is_converted) AS conversion_rate
    FROM fact_campaign_attribution
    GROUP BY touch_type
    ORDER BY conversion_rate DESC, touch_type;
  conversion_rate_by_campaign: |
    SELECT
        campaign_id,
        COUNT(*) AS attribution_record_count,
        SUM(is_converted) AS converted_touch_count,
        AVG(is_converted) AS conversion_rate
    FROM fact_campaign_attribution
    GROUP BY campaign_id
    ORDER BY conversion_rate DESC, campaign_id;
  touched_user_count_by_campaign: |
    SELECT
        campaign_id,
        COUNT(DISTINCT user_id) AS touched_user_count
    FROM fact_campaign_attribution
    GROUP BY campaign_id
    ORDER BY touched_user_count DESC, campaign_id;
  attribution_trend_by_day: |
    SELECT
        CAST(touch_at AS DATE) AS dt,
        COUNT(*) AS attribution_record_count,
        COUNT(DISTINCT user_id) AS touched_user_count
    FROM fact_campaign_attribution
    GROUP BY CAST(touch_at AS DATE)
    ORDER BY dt;
  attribution_trend_by_month: |
    SELECT
        STRFTIME(touch_at, '%Y-%m') AS month_key,
        COUNT(*) AS attribution_record_count,
        COUNT(DISTINCT user_id) AS touched_user_count
    FROM fact_campaign_attribution
    GROUP BY STRFTIME(touch_at, '%Y-%m')
    ORDER BY month_key;
  conversion_trend_by_month: |
    SELECT
        STRFTIME(touch_at, '%Y-%m') AS month_key,
        COUNT(*) AS attribution_record_count,
        SUM(is_converted) AS converted_touch_count,
        AVG(is_converted) AS conversion_rate
    FROM fact_campaign_attribution
    GROUP BY STRFTIME(touch_at, '%Y-%m')
    ORDER BY month_key;
  attribution_by_tenant: |
    SELECT
        u.tenant_id,
        COUNT(*) AS attribution_record_count,
        COUNT(DISTINCT a.user_id) AS touched_user_count,
        SUM(a.is_converted) AS converted_touch_count,
        AVG(a.is_converted) AS conversion_rate
    FROM fact_campaign_attribution a
    JOIN dim_user u
      ON a.user_id = u.user_id
    GROUP BY u.tenant_id
    ORDER BY attribution_record_count DESC, u.tenant_id;
  conversion_rate_by_tenant_profile: |
    SELECT
        t.country,
        t.industry,
        t.size_tier,
        COUNT(*) AS attribution_record_count,
        COUNT(DISTINCT a.user_id) AS touched_user_count,
        SUM(a.is_converted) AS converted_touch_count,
        AVG(a.is_converted) AS conversion_rate
    FROM fact_campaign_attribution a
    JOIN dim_user u
      ON a.user_id = u.user_id
    JOIN dim_tenant t
      ON u.tenant_id = t.tenant_id
    GROUP BY t.country, t.industry, t.size_tier
    ORDER BY conversion_rate DESC, t.country, t.industry, t.size_tier;

