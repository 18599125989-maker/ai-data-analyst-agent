sql_patterns:
  credit_usage_by_resource_type: |
    SELECT
        resource_type,
        SUM(quantity) AS total_quantity,
        COUNT(DISTINCT usage_id) AS credit_usage_record_count
    FROM fact_credit_usage
    GROUP BY resource_type
    ORDER BY total_quantity DESC, resource_type;
  credit_cost_by_resource_type: |
    SELECT
        resource_type,
        SUM(quantity * unit_cost) AS total_cost
    FROM fact_credit_usage
    GROUP BY resource_type
    ORDER BY total_cost DESC, resource_type;
  credit_usage_trend_by_day: |
    SELECT
        dt,
        resource_type,
        SUM(quantity) AS total_quantity,
        SUM(quantity * unit_cost) AS total_cost
    FROM fact_credit_usage
    GROUP BY dt, resource_type
    ORDER BY dt, resource_type;
  credit_usage_trend_by_month: |
    SELECT
        STRFTIME(dt, '%Y-%m') AS month_key,
        resource_type,
        SUM(quantity) AS total_quantity
    FROM fact_credit_usage
    GROUP BY STRFTIME(dt, '%Y-%m'), resource_type
    ORDER BY month_key, resource_type;
  credit_cost_trend_by_month: |
    SELECT
        STRFTIME(dt, '%Y-%m') AS month_key,
        SUM(quantity * unit_cost) AS total_cost
    FROM fact_credit_usage
    GROUP BY STRFTIME(dt, '%Y-%m')
    ORDER BY month_key;
  credit_usage_by_tenant: |
    SELECT
        tenant_id,
        resource_type,
        SUM(quantity) AS total_quantity,
        SUM(quantity * unit_cost) AS total_cost
    FROM fact_credit_usage
    GROUP BY tenant_id, resource_type
    ORDER BY total_cost DESC, tenant_id, resource_type;
  credit_cost_by_tenant: |
    SELECT
        tenant_id,
        SUM(quantity * unit_cost) AS total_cost
    FROM fact_credit_usage
    GROUP BY tenant_id
    ORDER BY total_cost DESC, tenant_id;
  credit_usage_by_tenant_profile: |
    SELECT
        t.country,
        t.industry,
        t.size_tier,
        c.resource_type,
        COUNT(DISTINCT c.tenant_id) AS tenant_count,
        SUM(c.quantity) AS total_quantity,
        SUM(c.quantity * c.unit_cost) AS total_cost
    FROM fact_credit_usage c
    JOIN dim_tenant t
      ON c.tenant_id = t.tenant_id
    GROUP BY t.country, t.industry, t.size_tier, c.resource_type
    ORDER BY total_cost DESC, t.country, t.industry, t.size_tier, c.resource_type;

