      用户 ID。
      用于将功能使用记录关联到用户维度，并进一步关联租户、部门等组织维度。
    references: dim_user.user_id
    validation_status: passed
    profile:
      null_rate: 0.0
      distinct_count: 15000
      distinct_rate: 0.0056
      min: U000005
      max: U049999
      sample_values:
        - U000005
        - U000011
        - U000014
        - U000020
        - U000021
      is_possible_primary_key: false
    notes:
      - >
        user_id 外键覆盖率已验证通过，unmatched_count = 0。
      - >
        统计用户数时应使用 COUNT(DISTINCT user_id)，不要把 COUNT(*) 当作用户数。

  feature_key:
    type: varchar
    semantic_type: foreign_key_dimension
    business_meaning: >
      功能标识，表示本条记录对应的产品功能模块。
      适合做功能分布、功能采用和功能使用强度分析。
    references: dim_feature.feature_key
    validation_status: passed
    profile:
      null_rate: 0.0
      distinct_count: 12
      distinct_rate: 0.0
      min: approval
      max: wiki
      sample_values:
        - base
        - video_conf
        - calendar
        - minutes
        - docs
        - whiteboard
        - approval
        - wiki
        - email
        - task
        - sheets
        - im
      is_possible_primary_key: false
    notes:
      - >
        feature_key 外键覆盖率已验证通过，unmatched_count = 0。
      - >
        feature_key 无 NULL 或空字符串，blank_or_null_count = 0。

  dt:
    type: date
    semantic_type: date_time_period
    business_meaning: >
      使用日期。
      该字段适合做按日趋势、窗口分析和跨表按 user_id + dt 对齐分析。
    references: null
    profile:
      null_rate: 0.0
      distinct_count: 365
      distinct_rate: 0.0001
