table_name: fact_feature_usage
card_version: v1.0
card_type: table_card

domain:
  id: C
  name: 产品使用

business_meaning: >
  功能使用事实表，记录用户在某一天对某个产品功能的使用情况。
  该表适合分析功能采用、功能活跃用户、功能操作次数和功能使用时长。
  当前验证显示该表可作为正式的功能使用分析事实表使用。

grain: >
  一行 = 一个 user_id 在某一天 dt 对一个 feature_key 的一条功能使用记录。
  当前验证显示 user_id + feature_key + dt 在现有数据中唯一，
  row_count = 2700092，distinct_primary_key_count = 2700092，
  duplicate_primary_key_count = 0，因此该粒度成立。

primary_key:
  - user_id
  - feature_key
  - dt

natural_key_candidate:
  - user_id
  - feature_key
  - dt

natural_key_status:
  is_unique: true
  tested_key:
    - user_id
    - feature_key
    - dt
  duplicated_group_count: 0
  note: >
    当前验证显示 user_id + feature_key + dt 在样本中唯一，
    可作为本表的复合物理主键与业务粒度键使用。

profile:
  row_count: 2700092
  column_count: 5
  source_profile_file: outputs/profiles/table_profiles.json
  source_column_profile_file: outputs/profiles/column_profiles.json
  validation_file: outputs/knowledge/validation/fact_feature_usage_validation.md
  profile_status: validated

