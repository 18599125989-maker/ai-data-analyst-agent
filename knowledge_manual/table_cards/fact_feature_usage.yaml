sql_patterns:
  daily_feature_usage_trend: |
    SELECT
        dt,
        COUNT(DISTINCT user_id) AS active_feature_user_count,
        ROUND(SUM(action_count), 2) AS total_action_count,
        ROUND(SUM(duration_sec), 2) AS total_duration_sec
    FROM fact_feature_usage
    GROUP BY dt
    ORDER BY dt;
  feature_usage_by_feature_key: |
    SELECT
        feature_key,
        COUNT(DISTINCT user_id) AS active_feature_user_count,
        ROUND(SUM(action_count), 2) AS total_action_count,
        ROUND(SUM(duration_sec), 2) AS total_duration_sec
    FROM fact_feature_usage
    GROUP BY feature_key
    ORDER BY total_action_count DESC, feature_key;
  feature_usage_by_user: |
    SELECT
        user_id,
        COUNT(DISTINCT feature_key) AS feature_count,
        ROUND(SUM(action_count), 2) AS total_action_count,
        ROUND(SUM(duration_sec), 2) AS total_duration_sec
    FROM fact_feature_usage
    GROUP BY user_id
    ORDER BY total_action_count DESC, user_id;
  feature_usage_by_tenant: |
    SELECT
        u.tenant_id,
        COUNT(DISTINCT f.user_id) AS active_feature_user_count,
        COUNT(DISTINCT f.feature_key) AS feature_count,
        ROUND(SUM(f.action_count), 2) AS total_action_count,
        ROUND(SUM(f.duration_sec), 2) AS total_duration_sec
    FROM fact_feature_usage f
    JOIN dim_user u
      ON f.user_id = u.user_id
    GROUP BY u.tenant_id
    ORDER BY total_action_count DESC, u.tenant_id;
  feature_usage_by_tenant_profile: |
    SELECT
        t.country,
        t.industry,
        t.size_tier,
        COUNT(DISTINCT u.tenant_id) AS tenant_count,
        COUNT(DISTINCT f.user_id) AS active_feature_user_count,
        ROUND(SUM(f.action_count), 2) AS total_action_count,
        ROUND(SUM(f.duration_sec), 2) AS total_duration_sec
    FROM fact_feature_usage f
    JOIN dim_user u
      ON f.user_id = u.user_id
    JOIN dim_tenant t
      ON u.tenant_id = t.tenant_id
    GROUP BY t.country, t.industry, t.size_tier
    ORDER BY total_action_count DESC, t.country, t.industry, t.size_tier;

prompt_summary: >
  fact_feature_usage 是功能使用事实表，粒度为一行一个 user_id 在某天 dt 对一个 feature_key 的使用记录。
  当前验证显示主键 user_id + feature_key + dt 唯一，user_id 与 dim_user、feature_key 与 dim_feature 的关联覆盖率均为 100%。
  常用路径为 user_id -> dim_user -> dim_tenant，以及 feature_key -> dim_feature。
  关键指标应使用 COUNT(DISTINCT user_id)、COUNT(DISTINCT feature_key)、SUM(action_count)、SUM(duration_sec)。
  关键陷阱是不要把 COUNT(*) 当作用户数或企业数，且与 fact_daily_usage 或 fact_ai_usage_log 关联时不能只按 user_id JOIN。

