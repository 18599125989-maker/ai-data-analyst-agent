        dt 无空值，时间范围为 2025-04-01T00:00:00 到 2026-03-31T00:00:00。
      - >
        适合做日趋势分析；跨表关联时优先按 user_id + dt 对齐。

  action_count:
    type: bigint
    semantic_type: metric
    business_meaning: >
      当天该用户在该功能上的操作次数。
      适合聚合为功能总操作量或用户层面的功能使用强度指标。
