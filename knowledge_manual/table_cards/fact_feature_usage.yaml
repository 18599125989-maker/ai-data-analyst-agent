join_keys:
  - column: user_id
    references: dim_user.user_id
    relationship: many_to_one
    join_condition: fact_feature_usage.user_id = dim_user.user_id
    purpose: 将功能使用记录关联到用户维度及其所属租户、部门等信息。
    risk_level: low
    validation_status: passed
    note: >
      user_id 外键覆盖率已验证通过，unmatched_count = 0。

  - column: feature_key
    references: dim_feature.feature_key
    relationship: many_to_one
    join_condition: fact_feature_usage.feature_key = dim_feature.feature_key
    purpose: 将功能使用记录关联到功能维度，分析功能类别与功能采用情况。
    risk_level: low
    validation_status: passed
    note: >
      feature_key 外键覆盖率已验证通过，unmatched_count = 0。

derived_join_paths:
  feature_usage_to_tenant:
    path:
      - fact_feature_usage.user_id = dim_user.user_id
      - dim_user.tenant_id = dim_tenant.tenant_id
    purpose: >
      将功能使用记录映射到租户，分析企业级功能采用和企业级使用强度。
    risk_level: medium
    validation_status: passed
  feature_usage_to_tenant_profile:
    path:
      - fact_feature_usage.user_id = dim_user.user_id
      - dim_user.tenant_id = dim_tenant.tenant_id
    purpose: >
      将功能使用与企业行业、规模、国家等画像维度结合，做租户画像分析。
    risk_level: medium
    validation_status: passed

field_groups:
  id_columns:
    - user_id
    - feature_key
    - dt
  time_columns:
    - dt
  metric_columns:
    - action_count
    - duration_sec
  dimension_columns:
    - user_id
    - feature_key
    - dt
  enum_columns:
    - feature_key
  json_columns: []
  text_columns: []

recommended_use_cases:
  - 按日分析功能使用趋势、功能活跃度和功能使用时长。
  - 分析不同 feature_key 的采用度、操作量和使用时长。
  - 结合 dim_user 和 dim_tenant 分析不同企业或用户群体的功能使用差异。
  - 与日粒度行为表按 user_id + dt 对齐，分析功能使用与整体活跃度之间的关系。

preferred_metrics:
  feature_usage_record_count:
    expression: COUNT(DISTINCT (user_id, feature_key, dt))
    meaning: 功能使用记录数
    applicable_grain: fact_feature_usage 原子粒度
    note: >
      由于当前主键为 user_id + feature_key + dt，记录数可按该复合键去重统计。
  active_feature_user_count:
    expression: COUNT(DISTINCT user_id)
    meaning: 使用过功能的用户数
    applicable_grain: 任意功能或时间汇总层级
    note: >
      统计用户数时应使用 COUNT(DISTINCT user_id)。
  feature_count:
    expression: COUNT(DISTINCT feature_key)
    meaning: 功能数
    applicable_grain: 任意时间或用户范围
    note: >
      统计功能覆盖数时应使用 COUNT(DISTINCT feature_key)。
  total_action_count:
    expression: SUM(action_count)
    meaning: 总功能操作次数
    applicable_grain: 任意汇总层级
    note: >
      使用量应按 SUM(action_count) 聚合。
  total_duration_sec:
    expression: SUM(duration_sec)
    meaning: 总功能使用时长（秒）
    applicable_grain: 任意汇总层级
    note: >
      使用时长应按 SUM(duration_sec) 聚合。

known_traps:
  - trap: >
      JOIN dim_user 或 dim_tenant 后直接用 COUNT(*) 当作用户数或企业数。
    consequence: >
      COUNT(*) 表示功能使用记录数，不是用户数，也不是企业数。
    prevention: >
      统计用户数使用 COUNT(DISTINCT user_id)；统计企业数需先通过 dim_user 映射 tenant_id，
      再使用 COUNT(DISTINCT tenant_id)。
  - trap: >
      统计功能数时直接使用 COUNT(*)。
    consequence: >
      会把使用记录数误当成功能数。
    prevention: >
      统计功能数应使用 COUNT(DISTINCT feature_key)。
  - trap: >
      统计功能使用量时只看记录条数，不聚合 action_count 或 duration_sec。
    consequence: >
      会低估或误读真实使用强度。
    prevention: >
      统计使用量应使用 SUM(action_count) 或 SUM(duration_sec)。
  - trap: >
      与 fact_daily_usage 或 fact_ai_usage_log 关联时只按 user_id JOIN。
    consequence: >
      会在多日、多记录情况下产生多对多膨胀，导致计数和时长被放大。
    prevention: >
      跨日粒度行为表关联时应优先按 user_id + dt 对齐，再根据分析目标控制聚合层级。

aggregation_notes:
  - >
    本表是日粒度功能明细表。按日汇总时可直接 GROUP BY dt。
  - >
    分析用户规模时应使用 COUNT(DISTINCT user_id)，不要把记录数当作用户数。
  - >
    分析企业规模时需先通过 dim_user 映射 tenant_id，再使用 COUNT(DISTINCT tenant_id)。
  - >
    分析功能使用量时，优先使用 SUM(action_count) 与 SUM(duration_sec)，而不是仅统计记录数。

