table_name: dim_tenant_config
card_version: v1
card_type: table_card
domain:
  id: A
  name: 租户与组织
business_meaning: >
  租户功能开关与配置维度表。
  用于记录每个 tenant 对各 feature 的启用状态和可选配置，
  适合分析功能启用率、租户功能覆盖情况和配置分布。
grain: >
  一行代表一个 tenant_id 对一个 feature_key 的配置记录。
  tenant_id + feature_key 是业务自然键/配置粒度。
primary_key: []
natural_key_candidate:
  - tenant_id
  - feature_key
natural_key_status:
  validation_status: passed
  is_unique: true
  note: >
    tenant_id + feature_key 已验证唯一，可作为业务自然键，但不是单列物理主键。
profile:
  row_count: 6000
  column_count: 4
  source_profile_file: outputs/profiles/table_profile.json
  source_column_profile_file: outputs/profiles/column_profile.json
  validation_file: outputs/knowledge/validation/dim_tenant_config_validation.md
  profile_status: validated_with_warnings
columns:
  tenant_id:
    type: varchar
    semantic_type: foreign_key
    business_meaning: >
      租户 ID。
    references: dim_tenant.tenant_id
    validation_status: passed
    profile:
      null_rate: 0.0
      distinct_count: 500
      distinct_rate: 0.0833
      min: T00001
      max: T00500
      sample_values:
        - T00001
        - T00002
        - T00003
        - T00004
        - T00005
      is_possible_primary_key: false
    notes:
      - >
        tenant_id 外键覆盖率 100%。
  feature_key:
    type: varchar
    semantic_type: foreign_key
    business_meaning: >
      功能 key，对应 dim_feature.feature_key。
    references: dim_feature.feature_key
    validation_status: passed
    profile:
      null_rate: 0.0
      distinct_count: 12
      distinct_rate: 0.002
      min: approval
      max: wiki
      sample_values:
        - approval
        - base
        - calendar
        - docs
        - email
      is_possible_primary_key: false
    notes:
      - >
        feature_key 外键覆盖率 100%。
      - >
        feature_key 无空值，每个 feature_key 当前各有 500 条配置记录。
  enabled:
    type: bigint
    semantic_type: binary_metric
    business_meaning: >
      功能是否启用，1 表示启用，0 表示未启用。
    references: null
    profile:
      null_rate: 0.0
      distinct_count: 2
      distinct_rate: 0.0003
      min: "0"
      max: "1"
      sample_values:
        - "0"
        - "1"
      is_possible_primary_key: false
    notes:
      - >
        enabled 是 0/1 开关字段，不是普通连续数值。
      - >
        SUM(enabled) 可统计启用数量，AVG(enabled) 可统计启用率。
      - >
        enabled = 0 是正常未启用值；当前 zero_count = 2035。
  config_json:
    type: varchar
    semantic_type: nullable_json_text
    business_meaning: >
      功能额外配置 JSON。
      非空时可表达不同 feature 的容量或限制配置。
    references: null
    profile:
      null_rate: 0.8333
      distinct_count: 7
      distinct_rate: 0.0012
      min: '{"max_participants": 100}'
      max: '{"max_tables": 50}'
      sample_values:
        - '{"max_tables": 20}'
        - '{"max_tables": 50}'
        - '{"max_tables": 100}'
        - '{"max_participants": 50}'
        - '{"max_participants": 100}'
        - '{"max_participants": 300}'
        - '{"max_participants": 500}'
      is_possible_primary_key: false
    notes:
      - >
        config_json 有 5000 条 None/空值，表示无额外配置或默认配置，不应视为严重脏数据。
      - >
        只有非空时才解析 JSON。
join_keys:
  - column: tenant_id
    references: dim_tenant.tenant_id
    relationship: many_to_one
    join_condition: dim_tenant_config.tenant_id = dim_tenant.tenant_id
    purpose: >
      将租户功能配置关联到租户画像维度。
    risk_level: low
    validation_status: passed
    note: >
      tenant_id 外键覆盖率 100%，unmatched_count = 0。
  - column: feature_key
    references: dim_feature.feature_key
    relationship: many_to_one
    join_condition: dim_tenant_config.feature_key = dim_feature.feature_key
    purpose: >
      将功能配置关联到功能维度。
    risk_level: low
    validation_status: passed
    note: >
      feature_key 外键覆盖率 100%，unmatched_count = 0。
derived_join_paths:
  tenant_config_to_tenant_profile:
    path:
      - dim_tenant_config.tenant_id = dim_tenant.tenant_id
    purpose: 将功能配置关联到租户国家、行业、规模等画像维度
    risk_level: low
    validation_status: passed
  tenant_config_to_feature_profile:
    path:
      - dim_tenant_config.feature_key = dim_feature.feature_key
    purpose: 将功能配置关联到功能模块、类别和展示名称
    risk_level: low
    validation_status: passed
field_groups:
  id_columns:
    - tenant_id
    - feature_key
  time_columns: []
  metric_columns:
    - enabled
  dimension_columns:
    - tenant_id
    - feature_key
    - config_json
  enum_columns:
    - feature_key
  json_columns:
    - config_json
  text_columns: []
recommended_use_cases:
  - 分析不同 feature 的启用率和启用租户数
  - 分析各租户已启用功能数量
  - 查看非空 config_json 的配置分布
  - 结合 dim_tenant 分析不同租户画像下的功能开关差异
preferred_metrics:
  config_record_count:
    expression: COUNT(*)
    meaning: 配置记录数
  tenant_count:
    expression: COUNT(DISTINCT tenant_id)
    meaning: 租户数
  feature_count:
    expression: COUNT(DISTINCT feature_key)
    meaning: 功能数
  enabled_config_count:
    expression: SUM(enabled)
    meaning: 启用配置数
  enabled_rate:
    expression: AVG(enabled)
    meaning: 启用率
known_traps:
  - trap: >
      不要把 config_json 为空当成严重数据质量错误。
    consequence: >
      会误判大量合法的默认配置或无额外配置记录。
    prevention: >
      config_json 为空通常表示默认配置或无额外配置；仅把非空值作为可解析配置处理。
  - trap: >
      只有 config_json 非空时才解析 JSON。
    consequence: >
      对空值统一按 JSON 解析会引入无意义异常或错误逻辑。
    prevention: >
      先过滤 config_json IS NOT NULL 且非空，再进行 JSON 解析。
  - trap: >
      把 enabled 当作普通连续数值。
    consequence: >
      enabled 是 0/1 开关字段，不适合按连续指标口径解释。
    prevention: >
      将 enabled 作为 binary flag 使用；SUM(enabled) 表示启用数量，AVG(enabled) 表示启用率。
  - trap: >
      统计企业数时直接使用 COUNT(*)。
    consequence: >
      COUNT(*) 是配置记录数，不是企业数。
    prevention: >
      统计企业数使用 COUNT(DISTINCT tenant_id)，统计功能数使用 COUNT(DISTINCT feature_key)。
  - trap: >
      JOIN fact_feature_usage 后直接 COUNT(*) 当作配置数量。
    consequence: >
      一条配置可能关联多条功能使用记录，JOIN 后会放大配置行数。
    prevention: >
      JOIN 后统计配置数量应回到 tenant_id + feature_key 粒度，或使用 COUNT(DISTINCT tenant_id || '|' || feature_key)。
aggregation_notes:
  - >
    配置记录数使用 COUNT(*)。
  - >
    企业数使用 COUNT(DISTINCT tenant_id)。
  - >
    功能数使用 COUNT(DISTINCT feature_key)。
  - >
    启用数量使用 SUM(enabled)，启用率使用 AVG(enabled)。
  - >
    config_json 默认只在非空时解析。
validation_summary:
  validation_file: outputs/knowledge/validation/dim_tenant_config_validation.md
  profile_filled: true
  grain_validated: true
  dq_validated: partial
  ready_for_agent_recommendation: true
  key_results:
    row_count: 6000
    column_count: 4
    natural_key_unique: true
    tenant_id_fk_unmatched_count: 0
    feature_key_fk_unmatched_count: 0
    config_json_blank_count: 5000
    enabled_zero_count: 2035
  interpretation:
    - >
      tenant_id + feature_key 已验证唯一，可作为配置粒度。
    - >
      tenant_id 和 feature_key 外键覆盖率均为 100%。
    - >
      enabled 是可直接用于开关分析的 0/1 字段。
    - >
      config_json 大量为空是主要 warning，但可解释为默认配置或无额外配置，不影响该表用于 feature 开关分析。
validation_checks:
  - basic_table_profile
  - column_count
  - primary_key_uniqueness
  - duplicated_primary_key_examples
  - main_foreign_key_coverage_checks
  - enum_distribution_checks
  - numeric_range_checks
  - json_parse_checks
  - main_sql_patterns_execution_checks
sql_patterns:
  enabled_rate_by_feature: |
    SELECT
        feature_key,
        AVG(enabled) AS enabled_rate
    FROM dim_tenant_config
    GROUP BY feature_key
    ORDER BY enabled_rate DESC, feature_key;
  enabled_count_by_feature: |
    SELECT
        feature_key,
        SUM(enabled) AS enabled_count
    FROM dim_tenant_config
    GROUP BY feature_key
    ORDER BY enabled_count DESC, feature_key;
  tenant_config_count: |
    SELECT
        COUNT(*) AS config_record_count,
        COUNT(DISTINCT tenant_id) AS tenant_count,
        COUNT(DISTINCT feature_key) AS feature_count
    FROM dim_tenant_config;
  enabled_features_by_tenant: |
    SELECT
        tenant_id,
        SUM(enabled) AS enabled_feature_count
    FROM dim_tenant_config
    GROUP BY tenant_id
    ORDER BY enabled_feature_count DESC, tenant_id;
  config_json_non_null_distribution: |
    SELECT
        config_json,
        COUNT(*) AS row_count
    FROM dim_tenant_config
    WHERE config_json IS NOT NULL
      AND TRIM(config_json) <> ''
      AND LOWER(TRIM(config_json)) <> 'none'
    GROUP BY config_json
    ORDER BY row_count DESC, config_json;
prompt_summary: >
  dim_tenant_config 是租户功能开关与配置表，grain 为一行一个 tenant_id 对一个
  feature_key 的配置记录。业务自然键是 tenant_id + feature_key。
  tenant_id 可 JOIN dim_tenant，feature_key 可 JOIN dim_feature。
  enabled 是 0/1 开关字段，可用 SUM(enabled) 统计启用数量、AVG(enabled) 统计启用率。
  config_json 大量为空，但通常表示默认配置或无额外配置；只有非空时才解析 JSON。
manual_review:
  required: true
  reviewed: true
  review_source: outputs/knowledge/validation/dim_tenant_config_validation.md
  checklist:
    - item: tenant_id 外键通过
      confirmed: true
    - item: feature_key 外键通过
      confirmed: true
    - item: tenant_id + feature_key 唯一
      confirmed: true
    - item: enabled 是 0/1 开关
      confirmed: true
    - item: config_json 大量为空，但可解释为无额外配置或默认配置
      confirmed: true
agent_usage_policy:
  table_grain_is_tenant_feature_config: true
  natural_key_is_tenant_id_feature_key: true
  enabled_is_binary_flag: true
  config_json_nullable_is_expected: true
  parse_config_json_only_when_non_null: true
  count_tenants_with_distinct_tenant_id: true
  count_features_with_distinct_feature_key: true
status:
  authoring_status: validated_with_warnings
  profile_filled: true
  grain_validated: true
  dq_validated: partial
  ready_for_agent: true
