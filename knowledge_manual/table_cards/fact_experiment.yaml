  enum_distribution: "SELECT\n feature_key,\n COUNT(DISTINCT exp_id) AS entity_count\nFROM fact_experiment\nGROUP BY feature_key\nORDER BY entity_count DESC, feature_key;"
  join_coverage_sample: "SELECT\n COUNT(*) AS row_count\nFROM fact_experiment base\nLEFT JOIN dim_feature ref\n ON base.feature_key = ref.feature_key;"
