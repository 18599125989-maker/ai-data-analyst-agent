sql_patterns:
  collaboration_by_day: |
    SELECT
        dt,
        COUNT(*) AS collaboration_record_count,
        COUNT(DISTINCT user_id) AS collaborating_user_count,
        COUNT(DISTINCT doc_id) AS collaborated_doc_count,
        SUM(edit_duration_sec) AS total_edit_duration_sec,
        SUM(comment_count) AS total_comment_count
    FROM fact_doc_collaboration
    GROUP BY dt
    ORDER BY dt;
  collaboration_by_month: |
    SELECT
        STRFTIME(dt, '%Y-%m') AS month,
        COUNT(*) AS collaboration_record_count,
        COUNT(DISTINCT user_id) AS collaborating_user_count,
        COUNT(DISTINCT doc_id) AS collaborated_doc_count,
        SUM(edit_duration_sec) AS total_edit_duration_sec,
        SUM(comment_count) AS total_comment_count
    FROM fact_doc_collaboration
    GROUP BY 1
    ORDER BY 1;
  collaboration_by_doc: |
    SELECT
        doc_id,
        COUNT(*) AS collaboration_record_count,
        COUNT(DISTINCT user_id) AS collaborating_user_count,
        SUM(edit_duration_sec) AS total_edit_duration_sec,
        SUM(comment_count) AS total_comment_count
    FROM fact_doc_collaboration
    GROUP BY doc_id
    ORDER BY total_edit_duration_sec DESC, total_comment_count DESC;
  collaboration_by_user: |
    SELECT
        user_id,
        COUNT(*) AS collaboration_record_count,
        COUNT(DISTINCT doc_id) AS collaborated_doc_count,
        SUM(edit_duration_sec) AS total_edit_duration_sec,
        SUM(comment_count) AS total_comment_count
    FROM fact_doc_collaboration
    GROUP BY user_id
    ORDER BY total_edit_duration_sec DESC, total_comment_count DESC;
  collaboration_by_doc_user_day: |
    SELECT
        doc_id,
        user_id,
        dt,
        COUNT(*) AS detail_record_count,
        SUM(edit_duration_sec) AS total_edit_duration_sec,
        SUM(comment_count) AS total_comment_count
    FROM fact_doc_collaboration
    GROUP BY doc_id, user_id, dt
    ORDER BY dt, doc_id, user_id;
  collaboration_by_tenant: |
    SELECT
        u.tenant_id,
        COUNT(*) AS collaboration_record_count,
        COUNT(DISTINCT c.user_id) AS collaborating_user_count,
        COUNT(DISTINCT c.doc_id) AS collaborated_doc_count,
        SUM(c.edit_duration_sec) AS total_edit_duration_sec,
        SUM(c.comment_count) AS total_comment_count
    FROM fact_doc_collaboration c
    JOIN dim_user u
      ON c.user_id = u.user_id
    GROUP BY u.tenant_id
    ORDER BY total_edit_duration_sec DESC, total_comment_count DESC;
  top_collaborated_docs: |
    SELECT
        doc_id,
        COUNT(DISTINCT user_id) AS collaborating_user_count,
        SUM(edit_duration_sec) AS total_edit_duration_sec,
        SUM(comment_count) AS total_comment_count
    FROM fact_doc_collaboration
    GROUP BY doc_id
    ORDER BY collaborating_user_count DESC, total_edit_duration_sec DESC
    LIMIT 100;
  top_collaborating_users: |
    SELECT
        user_id,
        COUNT(DISTINCT doc_id) AS collaborated_doc_count,
        SUM(edit_duration_sec) AS total_edit_duration_sec,
        SUM(comment_count) AS total_comment_count
    FROM fact_doc_collaboration
    GROUP BY user_id
    ORDER BY collaborated_doc_count DESC, total_edit_duration_sec DESC
    LIMIT 100;
  doc_collaboration_with_document_profile: |
    SELECT
        c.doc_id,
        d.owner_user_id,
        COUNT(*) AS collaboration_record_count,
        COUNT(DISTINCT c.user_id) AS collaborating_user_count,
        SUM(c.edit_duration_sec) AS total_edit_duration_sec,
        SUM(c.comment_count) AS total_comment_count
    FROM fact_doc_collaboration c
    JOIN fact_document d
      ON c.doc_id = d.doc_id
    GROUP BY c.doc_id, d.owner_user_id
    ORDER BY total_edit_duration_sec DESC, total_comment_count DESC;
prompt_summary: >
  fact_doc_collaboration 是文档协作明细事实表。
  它没有单列物理主键，doc_id + user_id + dt 也不是严格唯一；
  当前已知仍有 33 组重复，但没有完全重复行。
  常用 JOIN 为 doc_id -> fact_document.doc_id 和 user_id -> dim_user.user_id。
  统计记录数用 COUNT(*)，统计文档数用 COUNT(DISTINCT doc_id)，统计用户数用
  COUNT(DISTINCT user_id)。
  做文档-用户-日期级分析时，必须 GROUP BY doc_id, user_id, dt，
  并 SUM(edit_duration_sec)、SUM(comment_count)；不能默认按唯一行处理。
