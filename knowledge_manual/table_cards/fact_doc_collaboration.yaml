join_keys:
  - column: doc_id
    references: fact_document.doc_id
    relationship: many_to_one
    join_condition: fact_doc_collaboration.doc_id = fact_document.doc_id
    purpose: >
      将协作记录关联到文档维度。
    risk_level: low
    validation_status: passed
    note: >
      unmatched_count = 0。
  - column: user_id
    references: dim_user.user_id
    relationship: many_to_one
    join_condition: fact_doc_collaboration.user_id = dim_user.user_id
    purpose: >
      将协作记录关联到用户维度。
    risk_level: low
    validation_status: passed
    note: >
      unmatched_count = 0。
derived_join_paths:
  collaboration_to_tenant:
    path:
      - fact_doc_collaboration.user_id = dim_user.user_id
      - dim_user.tenant_id = dim_tenant.tenant_id
    purpose: 将文档协作记录关联到租户维度
    risk_level: medium
    validation_status: pending_or_passed_if_already_checked
    note: >
      同一用户/文档/日期可能有多条协作记录。统计用户数或文档数时必须
      COUNT(DISTINCT user_id/doc_id)，统计协作量时才聚合记录。
  collaboration_to_document:
    path:
      - fact_doc_collaboration.doc_id = fact_document.doc_id
    purpose: 将协作记录关联到文档维度
    risk_level: low
    validation_status: passed
field_groups:
  id_columns:
    - doc_id
    - user_id
  time_columns:
    - dt
  metric_columns:
    - edit_duration_sec
    - comment_count
  dimension_columns:
    - doc_id
    - user_id
    - dt
  enum_columns: []
  json_columns: []
  text_columns: []
recommended_use_cases:
  - 分析文档协作记录数、协作文档数和协作用户数
  - 分析文档级、用户级、租户级协作强度
  - 按日或按月观察编辑时长与评论量趋势
  - 结合 fact_document 分析高协作文档
preferred_metrics:
  collaboration_record_count:
    expression: COUNT(*)
    meaning: 协作明细记录数
  collaborating_user_count:
    expression: COUNT(DISTINCT user_id)
    meaning: 参与协作用户数
  collaborated_doc_count:
    expression: COUNT(DISTINCT doc_id)
    meaning: 被协作的文档数
  total_edit_duration_sec:
    expression: SUM(edit_duration_sec)
    meaning: 总编辑协作时长秒数
  total_edit_duration_hours:
    expression: SUM(edit_duration_sec) / 3600.0
    meaning: 总编辑协作时长小时数
  total_comment_count:
    expression: SUM(comment_count)
    meaning: 总评论数
  doc_user_day_collaboration_count:
    expression: COUNT(DISTINCT doc_id || '|' || user_id || '|' || CAST(dt AS VARCHAR))
    meaning: 文档-用户-日期组合数，不等于严格记录数
known_traps:
  - trap: >
      把 doc_id + user_id 当作唯一粒度。
    consequence: >
      同一用户可以在多天协作同一文档，doc_id + user_id 存在重复。
    prevention: >
      如果需要文档-用户级分析，应 GROUP BY doc_id, user_id，并聚合
      SUM(edit_duration_sec)、SUM(comment_count)。
  - trap: >
      把 doc_id + user_id + dt 当作严格唯一粒度。
    consequence: >
      人工检查发现 doc_id + user_id + dt 仍有 33 组重复。
      如果只取一条记录，会低估协作时长和评论数。
    prevention: >
      文档-用户-日期级分析必须 GROUP BY doc_id, user_id, dt，
      并 SUM(edit_duration_sec)、SUM(comment_count)。
  - trap: >
      把重复记录当作脏数据删除。
    consequence: >
      完全重复行不存在，这些重复更可能是同一用户同一天对同一文档的多次协作明细。
      删除会丢失协作行为。
    prevention: >
      不删除重复记录，按目标粒度聚合。
  - trap: >
      直接 COUNT(*) 当作文档数或用户数。
    consequence: >
      COUNT(*) 是协作明细记录数，不是文档数，也不是用户数。
    prevention: >
      文档数使用 COUNT(DISTINCT doc_id)，用户数使用 COUNT(DISTINCT user_id)。
  - trap: >
      把 edit_duration_sec 当作分钟或小时。
    consequence: >
      edit_duration_sec 单位是秒，直接解释为分钟/小时会出错。
    prevention: >
      需要分钟时除以 60，需要小时数时除以 3600。
  - trap: >
      把 comment_count = 0 或 edit_duration_sec = 0 当作异常。
    consequence: >
      0 是允许值，表示没有评论或无编辑时长记录。
    prevention: >
      保留 0 值，可用于协作强度分析。
aggregation_notes:
  - >
    记录数使用 COUNT(*)。
  - >
    用户数使用 COUNT(DISTINCT user_id)。
  - >
    文档数使用 COUNT(DISTINCT doc_id)。
  - >
    文档-用户-日期级分析需要 GROUP BY doc_id, user_id, dt，并对
    edit_duration_sec、comment_count 做 SUM 聚合。
  - >
    不要假设 doc_id + user_id + dt 唯一。
