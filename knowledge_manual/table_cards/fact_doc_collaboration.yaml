table_name: fact_doc_collaboration
card_version: v1
card_type: table_card
domain:
  id: D
  name: 协作与内容
business_meaning: >
  文档协作明细事实表。
  用于记录用户对文档的协作行为明细，可用于分析协作文档数、协作用户数、
  编辑时长、评论数量以及协作时间趋势。
grain: >
  一行代表一个用户对一个文档的一条协作明细记录。
  doc_id + user_id 不唯一；同一用户可以在多天协作同一文档。
  doc_id + user_id + dt 也不是严格唯一；人工检查发现仍有 33 组重复。
  完全重复行不存在，因此重复不是整行脏重复，不应删除。
  如果要分析文档-用户-日期级协作，应先 GROUP BY doc_id, user_id, dt，并
  SUM(edit_duration_sec)、SUM(comment_count)。
  如果要分析文档级协作，应按 doc_id 聚合。
  如果要分析用户级协作，应按 user_id 聚合。
primary_key: []
natural_key_candidate:
  - doc_id
  - user_id
  - dt
natural_key_status:
  validation_status: failed
  is_unique: false
  tested_key:
    - doc_id
    - user_id
    - dt
  duplicated_group_count: 33
  exact_duplicate_row_count: 0
  note: >
    doc_id + user_id + dt 仍存在 33 组重复，因此不能作为严格自然键。
    但完全重复行不存在，说明重复不是整行脏重复。
    更合理的业务解释是同一用户、同一文档、同一天内可能存在多条协作明细记录。
  required_agent_behavior: >
    分析文档-用户-日期级协作时必须 GROUP BY doc_id, user_id, dt，
    并聚合 SUM(edit_duration_sec)、SUM(comment_count)。
profile:
  row_count: 89676
  column_count: 5
  source_profile_file: outputs/profiles/table_profile.json
  source_column_profile_file: outputs/profiles/column_profile.json
  validation_file: outputs/knowledge/validation/fact_doc_collaboration_validation.md
  profile_status: validated_with_warnings
