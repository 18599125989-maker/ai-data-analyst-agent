prompt_summary: >
  fact_daily_usage 是用户日级使用汇总表，一行代表一个 user_id 在某天 dt 的使用记录，
  业务自然键 user_id + dt 已验证唯一，但该表没有单列物理主键。
  常用路径包括 user_id -> dim_user -> dim_tenant，以及与 AI 使用或功能使用表按 user_id + 日期对齐关联。
  DAU 使用 COUNT(DISTINCT user_id)，session 总数使用 SUM(session_count)，活跃时长总数使用 SUM(active_duration_sec)。
  feature_usage_json 虽然可解析，但第一版默认不解析；如分析功能使用，优先使用 fact_feature_usage。
  关键陷阱是不要把 COUNT(*) 当作用户数，也不要只按 user_id 去 JOIN AI 或功能表。

