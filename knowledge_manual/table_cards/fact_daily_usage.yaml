sql_patterns:
  daily_active_users: |
    SELECT
        dt,
        COUNT(DISTINCT user_id) AS daily_active_user_count
    FROM fact_daily_usage
    GROUP BY dt
    ORDER BY dt;
  monthly_active_users: |
    SELECT
        STRFTIME(dt, '%Y-%m') AS month_key,
        COUNT(DISTINCT user_id) AS monthly_active_user_count
    FROM fact_daily_usage
    GROUP BY STRFTIME(dt, '%Y-%m')
    ORDER BY month_key;
  session_and_duration_by_day: |
    SELECT
        dt,
        COUNT(DISTINCT user_id) AS daily_active_user_count,
        SUM(session_count) AS total_session_count,
        SUM(active_duration_sec) AS total_active_duration_sec
    FROM fact_daily_usage
    GROUP BY dt
    ORDER BY dt;
  session_and_duration_by_month: |
    SELECT
        STRFTIME(dt, '%Y-%m') AS month_key,
        COUNT(DISTINCT user_id) AS active_user_count,
        SUM(session_count) AS total_session_count,
        SUM(active_duration_sec) AS total_active_duration_sec
    FROM fact_daily_usage
    GROUP BY STRFTIME(dt, '%Y-%m')
    ORDER BY month_key;
  daily_usage_by_tenant: |
    SELECT
        u.tenant_id,
        dt,
        COUNT(DISTINCT f.user_id) AS daily_active_user_count,
        SUM(f.session_count) AS total_session_count,
        SUM(f.active_duration_sec) AS total_active_duration_sec
    FROM fact_daily_usage f
    JOIN dim_user u
      ON f.user_id = u.user_id
    GROUP BY u.tenant_id, dt
    ORDER BY dt, u.tenant_id;
  daily_usage_by_tenant_profile: |
    SELECT
        t.country,
        t.industry,
        t.size_tier,
        f.dt,
        COUNT(DISTINCT f.user_id) AS daily_active_user_count,
        SUM(f.session_count) AS total_session_count,
        SUM(f.active_duration_sec) AS total_active_duration_sec
    FROM fact_daily_usage f
    JOIN dim_user u
      ON f.user_id = u.user_id
    JOIN dim_tenant t
      ON u.tenant_id = t.tenant_id
    GROUP BY t.country, t.industry, t.size_tier, f.dt
    ORDER BY f.dt, t.country, t.industry, t.size_tier;
  monthly_active_users_by_industry: |
    SELECT
        DATE_TRUNC('month', f.dt) AS month,
        t.industry,
        COUNT(DISTINCT f.user_id) AS monthly_active_users
    FROM fact_daily_usage f
    JOIN dim_user u
      ON f.user_id = u.user_id
    JOIN dim_tenant t
      ON u.tenant_id = t.tenant_id
    GROUP BY month, t.industry
    ORDER BY month, t.industry;
  avg_active_duration_by_tenant: |
    SELECT
        u.tenant_id,
        AVG(f.active_duration_sec) AS avg_active_duration_sec_per_user_day
    FROM fact_daily_usage f
    JOIN dim_user u
      ON f.user_id = u.user_id
    GROUP BY u.tenant_id
    ORDER BY avg_active_duration_sec_per_user_day DESC, u.tenant_id;
  compare_ai_user_days_vs_non_ai_user_days: |
    WITH ai_user_days AS (
        SELECT
            m.user_id,
            CAST(a.created_at AS DATE) AS dt
        FROM fact_ai_usage_log a
        JOIN dim_user_id_mapping m
          ON a.user_id_hash = m.user_id_hash
        GROUP BY m.user_id, CAST(a.created_at AS DATE)
    )
    SELECT
        CASE WHEN a.user_id IS NULL THEN 'non_ai_user_day' ELSE 'ai_user_day' END AS user_day_type,
        COUNT(*) AS daily_usage_record_count,
        COUNT(DISTINCT d.user_id) AS daily_active_user_count,
        AVG(d.session_count) AS avg_session_count_per_user_day,
        AVG(d.active_duration_sec) AS avg_active_duration_sec_per_user_day
    FROM fact_daily_usage d
    LEFT JOIN ai_user_days a
      ON d.user_id = a.user_id
     AND d.dt = a.dt
    GROUP BY CASE WHEN a.user_id IS NULL THEN 'non_ai_user_day' ELSE 'ai_user_day' END
    ORDER BY user_day_type;
  compare_feature_usage_with_daily_usage: |
    SELECT
        d.dt,
        COUNT(DISTINCT d.user_id) AS daily_active_user_count,
        COUNT(DISTINCT f.user_id) AS feature_user_count,
        SUM(d.session_count) AS total_session_count,
        SUM(f.action_count) AS total_action_count,
        SUM(f.duration_sec) AS total_feature_duration_sec
    FROM fact_daily_usage d
    LEFT JOIN fact_feature_usage f
      ON d.user_id = f.user_id
     AND d.dt = f.dt
    GROUP BY d.dt
    ORDER BY d.dt;

