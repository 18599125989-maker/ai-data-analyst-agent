sql_patterns:
  time_distribution: "SELECT\n start_date AS time_key,\n COUNT(*) AS row_count\nFROM fact_campaign\nGROUP BY start_date\nORDER BY start_date;"
  enum_distribution: "SELECT\n channel,\n COUNT(DISTINCT campaign_id) AS entity_count\nFROM fact_campaign\nGROUP BY channel\nORDER BY entity_count DESC, channel;"
  metric_trend: "SELECT\n start_date AS time_key,\n ROUND(SUM(budget), 2) AS total_budget\nFROM fact_campaign\nGROUP BY start_date\nORDER BY start_date;"
