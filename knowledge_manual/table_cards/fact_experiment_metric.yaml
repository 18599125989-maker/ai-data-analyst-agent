sql_patterns:
  time_distribution: "SELECT\n dt AS time_key,\n COUNT(*) AS row_count\nFROM fact_experiment_metric\nGROUP BY dt\nORDER BY dt;"
  enum_distribution: "SELECT\n variant,\n COUNT(DISTINCT exp_id) AS entity_count\nFROM fact_experiment_metric\nGROUP BY variant\nORDER BY entity_count DESC, variant;"
  metric_trend: "SELECT\n dt AS time_key,\n ROUND(SUM(sample_size), 2) AS total_sample_size\nFROM fact_experiment_metric\nGROUP BY dt\nORDER BY dt;"
  join_coverage_sample: "SELECT\n COUNT(*) AS row_count\nFROM fact_experiment_metric base\nLEFT JOIN fact_experiment ref\n ON base.exp_id = ref.exp_id;"
