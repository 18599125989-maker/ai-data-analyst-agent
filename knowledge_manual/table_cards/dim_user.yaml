sql_patterns:
  registered_users_by_month:
    description: 按注册月份统计新增用户数。
    sql: "SELECT\n STRFTIME(DATE_TRUNC('month', register_at), '%Y-%m') AS register_month,\n COUNT(DISTINCT user_id) AS registered_user_count\nFROM dim_user\nGROUP BY register_month\nORDER BY register_month;"
  users_by_role:
    description: 按当前角色统计用户数。
    sql: "SELECT\n role,\n COUNT(DISTINCT user_id) AS user_count\nFROM dim_user\nGROUP BY role\nORDER BY user_count DESC, role;"
  users_by_tenant_country:
    description: 按企业国家统计用户数。
    sql: "SELECT\n t.country,\n COUNT(DISTINCT u.user_id) AS user_count\nFROM dim_user u\nLEFT JOIN dim_tenant t\n ON u.tenant_id = t.tenant_id\nGROUP BY t.country\nORDER BY user_count DESC, t.country;"
