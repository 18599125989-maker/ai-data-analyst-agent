recommended_use_cases:
- 基于数据字典理解 dim_user 的表级业务含义与字段语义
- 在运行 validation 脚本前做主键、粒度、时间口径与枚举口径假设梳理
- 按数据字典声明的枚举字段做结构分布分析
- 基于数据字典说明的时间字段做趋势或窗口分析
preferred_metrics:
  user_count:
    expression: COUNT(DISTINCT user_id)
    meaning: 用户数量
    applicable_grain: 用户级
    note: 用户实体计数的标准口径。
  registered_user_count:
    expression: COUNT(DISTINCT user_id)
    meaning: 指定时间窗内注册用户数
    applicable_grain: register_at 时间级
    note: 通常配合 DATE_TRUNC 或 STRFTIME 使用。
  active_status_user_count:
    expression: COUNT(DISTINCT CASE WHEN status = 'active' THEN user_id END)
    meaning: 当前状态为 active 的用户数
    applicable_grain: 用户级
    note: 这是当前状态口径，不是历史任意日期活跃口径。
known_traps:
- trap: 把数据字典声明的主键直接当作已验证事实。
  consequence: 如果当前 DuckDB 数据与字典存在偏差，可能误判粒度或唯一性。
  prevention: 将“`user_id`”只视为数据字典假设，必须以后续 validation 脚本结果为准。
- trap: 将 COUNT(*) 与 COUNT(DISTINCT 实体键) 混用。
  consequence: 在一对多 JOIN 或非唯一粒度表中，可能把记录数误读成实体数。
  prevention: 先依据数据字典粒度说明和 validation 结果确认使用哪个计数口径。
aggregation_notes:
- 数据字典说明该表粒度为：一行 = 一个用户。聚合前必须先验证这一粒度在当前数据中是否成立。
- 当前所有聚合说明都仅基于数据字典，不代表已经通过验证。
