join_keys:
  - column: tenant_id
    references: dim_tenant.tenant_id
    relationship: many_to_one
    join_condition: fact_tenant_metrics_snapshot.tenant_id = dim_tenant.tenant_id
    purpose: 将租户快照指标关联到租户维度。
    risk_level: low
    validation_status: passed
    note: >
      tenant_id 外键覆盖率已验证通过，unmatched_count = 0。

derived_join_paths:
  tenant_snapshot_to_tenant_profile:
    path:
      - fact_tenant_metrics_snapshot.tenant_id = dim_tenant.tenant_id
    purpose: 将租户快照指标关联到国家、行业、规模等租户画像维度
    risk_level: low
    validation_status: passed

field_groups:
  id_columns:
    - tenant_id
    - snapshot_date
  time_columns:
    - snapshot_date
  metric_columns:
    - total_users
    - total_docs
    - total_storage_mb
    - total_revenue
    - total_messages
    - active_users_today
  dimension_columns:
    - tenant_id
  enum_columns: []
  json_columns: []
  text_columns: []

recommended_use_cases:
  - 按日期分析租户规模、内容量、收入快照和消息量的变化趋势。
  - 做租户总览和最新状态分析。
  - 结合 dim_tenant 分析不同国家、行业、规模租户的状态差异。
  - 分析低活跃租户和活跃用户变化趋势。

preferred_metrics:
  snapshot_record_count:
    expression: COUNT(*)
    meaning: 快照记录数
    applicable_grain: fact_tenant_metrics_snapshot 原子粒度
    note: >
      当前已验证 tenant_id + snapshot_date 唯一，因此 snapshot_record_count 可直接使用 COUNT(*)。
  snapshot_tenant_count:
    expression: COUNT(DISTINCT tenant_id)
    meaning: 快照覆盖租户数
    applicable_grain: 单日或任意聚合层级
    note: >
      按日期比较时应同时输出 tenant_count。
  total_users_on_date:
    expression: SUM(total_users)
    meaning: 某快照日期的总用户数
    applicable_grain: 单个 snapshot_date
    note: >
      仅应在单个 snapshot_date 过滤或按日期分组后使用。
  avg_users_per_tenant:
    expression: AVG(total_users)
    meaning: 平均每租户用户数
    applicable_grain: 单日或任意已分组层级
    note: >
      有助于在 tenant 覆盖数变化时做稳健比较。
  total_docs_on_date:
    expression: SUM(total_docs)
    meaning: 某快照日期的总文档数
    applicable_grain: 单个 snapshot_date
    note: >
      不要跨多个 snapshot_date 直接 SUM 后解释为期间新增文档数。
  total_storage_mb_on_date:
    expression: SUM(total_storage_mb)
    meaning: 某快照日期的总存储量
    applicable_grain: 单个 snapshot_date
    note: >
      单位为 MB，属于快照状态值。
  total_revenue_snapshot_on_date:
    expression: SUM(total_revenue)
    meaning: 某快照日期的租户收入快照总量，不等于期间实收
    applicable_grain: 单个 snapshot_date
    note: >
      问实收收入时应改用 fact_actual_revenue。
  active_users_today:
    expression: SUM(active_users_today)
    meaning: 当天活跃用户数合计
    applicable_grain: 单个 snapshot_date 或按日期趋势
    note: >
      0 值允许存在，不应视为异常。

known_traps:
  - trap: >
      跨多个 snapshot_date 直接 SUM(total_users)、SUM(total_docs)、SUM(total_revenue)。
    consequence: >
      这些字段是快照状态值，不是事件增量。跨多个日期直接求和会重复累计，导致严重高估。
    prevention: >
      如果分析某一天的总规模，先筛选单个 snapshot_date 再聚合。
      如果分析最新状态，先取每个 tenant 的最新 snapshot_date。
      如果分析趋势，按 snapshot_date 分组，不要把多个日期合并成一个总量。
  - trap: >
      把 total_revenue 当作期间实收收入。
    consequence: >
      total_revenue 是租户级快照指标，不等同于 fact_actual_revenue.actual_revenue、fact_invoice.amount 或 fact_payment.amount。
    prevention: >
      问实收收入使用 fact_actual_revenue.actual_revenue。
      问发票金额使用 fact_invoice。
      问付款金额使用 fact_payment。
      问租户快照状态或租户总览时才使用 total_revenue。
  - trap: >
      忽略 snapshot_date 的 tenant 覆盖数量。
    consequence: >
      某些日期只有 368 条记录，某些日期有 500 条记录。
      直接比较总量可能混入覆盖租户数变化的影响。
    prevention: >
      按日期分析时同时输出 COUNT(DISTINCT tenant_id) AS tenant_count。
      必要时比较平均值或只比较覆盖完整的日期。
  - trap: >
      把 active_users_today 的 0 当作异常值。
    consequence: >
      active_users_today = 0 是合法值，表示该租户当天无活跃用户。
    prevention: >
      保留 0 值，可用于活跃率或低活跃租户分析。
  - trap: >
      JOIN dim_tenant 后直接 COUNT(*) 当作租户总数。
    consequence: >
      COUNT(*) 是快照记录数，不是租户数。
    prevention: >
      统计租户数使用 COUNT(DISTINCT tenant_id)。
  - trap: >
      把 2026-04 当作完整月份参与月度趋势比较。
    consequence: >
      当前最大 snapshot_date 为 2026-04-01，是边界日期，2026-04 不是完整月份。
    prevention: >
      完整月度趋势优先使用 2025-04 到 2026-03；如展示 2026-04，需注明不完整。

aggregation_notes:
  - >
    趋势分析必须 GROUP BY snapshot_date 或月份。
  - >
    按日期聚合时同时输出 COUNT(DISTINCT tenant_id) AS tenant_count。
  - >
    最新状态分析应先取每个 tenant 的 MAX(snapshot_date)。
  - >
    不要跨日期直接 SUM 快照状态字段。

