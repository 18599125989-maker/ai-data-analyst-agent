prompt_summary: >
  fact_tenant_metrics_snapshot 是租户日度状态快照表，一行代表一个 tenant 在一个 snapshot_date 的指标快照，
  主键 tenant_id + snapshot_date 已验证唯一。
  该表是快照表，不是事件流水表；total_users、total_docs、total_storage_mb、total_revenue、total_messages
  都是状态值，跨多个日期直接 SUM 会重复累计。
  常用路径是 tenant_id -> dim_tenant，用于补充国家、行业、规模等租户画像。
  分析趋势时必须按 snapshot_date 或月份分组，并同时输出 tenant_count；分析最新状态时应先取每个 tenant 的最新 snapshot_date。

