sql_patterns:
  latest_snapshot_per_tenant: |
    SELECT
        tenant_id,
        MAX(snapshot_date) AS latest_snapshot_date
    FROM fact_tenant_metrics_snapshot
    GROUP BY tenant_id
    ORDER BY tenant_id;
  tenant_metrics_latest_snapshot: |
    WITH latest AS (
        SELECT
            tenant_id,
            MAX(snapshot_date) AS snapshot_date
        FROM fact_tenant_metrics_snapshot
        GROUP BY tenant_id
    )
    SELECT
        s.tenant_id,
        s.snapshot_date,
        s.total_users,
        s.total_docs,
        s.total_storage_mb,
        s.total_revenue,
        s.total_messages,
        s.active_users_today
    FROM fact_tenant_metrics_snapshot s
    JOIN latest l
      ON s.tenant_id = l.tenant_id
     AND s.snapshot_date = l.snapshot_date
    ORDER BY s.tenant_id;
  daily_snapshot_coverage: |
    SELECT
        snapshot_date,
        COUNT(DISTINCT tenant_id) AS tenant_count,
        COUNT(DISTINCT (tenant_id, snapshot_date)) AS snapshot_record_count
    FROM fact_tenant_metrics_snapshot
    GROUP BY snapshot_date
    ORDER BY snapshot_date;
  tenant_metrics_trend_by_day: |
    SELECT
        snapshot_date,
        COUNT(DISTINCT tenant_id) AS tenant_count,
        SUM(total_users) AS total_users_on_date,
        SUM(total_docs) AS total_docs_on_date,
        SUM(total_storage_mb) AS total_storage_mb_on_date,
        SUM(total_revenue) AS total_revenue_snapshot_on_date,
        SUM(total_messages) AS total_messages_on_date,
        SUM(active_users_today) AS active_users_today
    FROM fact_tenant_metrics_snapshot
    GROUP BY snapshot_date
    ORDER BY snapshot_date;
  tenant_metrics_trend_by_month_complete_months: |
    SELECT
        STRFTIME(snapshot_date, '%Y-%m') AS month_key,
        COUNT(DISTINCT tenant_id) AS tenant_count,
        AVG(total_users) AS avg_users_per_tenant,
        AVG(total_docs) AS avg_docs_per_tenant,
        AVG(total_storage_mb) AS avg_storage_mb_per_tenant,
        AVG(total_revenue) AS avg_revenue_snapshot_per_tenant,
        AVG(total_messages) AS avg_messages_per_tenant,
        SUM(active_users_today) AS total_active_users_today
    FROM fact_tenant_metrics_snapshot
    WHERE snapshot_date < DATE '2026-04-01'
    GROUP BY STRFTIME(snapshot_date, '%Y-%m')
    ORDER BY month_key;
  tenant_metrics_by_country_latest_snapshot: |
    WITH latest AS (
        SELECT
            tenant_id,
            MAX(snapshot_date) AS snapshot_date
        FROM fact_tenant_metrics_snapshot
        GROUP BY tenant_id
    )
    SELECT
        t.country,
        COUNT(DISTINCT s.tenant_id) AS tenant_count,
        SUM(s.total_users) AS total_users_on_date,
        SUM(s.total_docs) AS total_docs_on_date,
        SUM(s.total_storage_mb) AS total_storage_mb_on_date,
        SUM(s.total_revenue) AS total_revenue_snapshot_on_date
    FROM fact_tenant_metrics_snapshot s
    JOIN latest l
      ON s.tenant_id = l.tenant_id
     AND s.snapshot_date = l.snapshot_date
    JOIN dim_tenant t
      ON s.tenant_id = t.tenant_id
    GROUP BY t.country
    ORDER BY tenant_count DESC, t.country;
  tenant_metrics_by_industry_latest_snapshot: |
    WITH latest AS (
        SELECT
            tenant_id,
            MAX(snapshot_date) AS snapshot_date
        FROM fact_tenant_metrics_snapshot
        GROUP BY tenant_id
    )
    SELECT
        t.industry,
        COUNT(DISTINCT s.tenant_id) AS tenant_count,
        SUM(s.total_users) AS total_users_on_date,
        SUM(s.total_docs) AS total_docs_on_date,
        SUM(s.total_storage_mb) AS total_storage_mb_on_date,
        SUM(s.total_revenue) AS total_revenue_snapshot_on_date
    FROM fact_tenant_metrics_snapshot s
    JOIN latest l
      ON s.tenant_id = l.tenant_id
     AND s.snapshot_date = l.snapshot_date
    JOIN dim_tenant t
      ON s.tenant_id = t.tenant_id
    GROUP BY t.industry
    ORDER BY tenant_count DESC, t.industry;
  low_active_tenants_by_day: |
    SELECT
        snapshot_date,
        tenant_id,
        active_users_today,
        total_users
    FROM fact_tenant_metrics_snapshot
    WHERE active_users_today = 0
    ORDER BY snapshot_date, tenant_id;

