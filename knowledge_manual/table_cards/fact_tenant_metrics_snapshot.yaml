table_name: fact_tenant_metrics_snapshot
card_version: v1.0
card_type: table_card

domain:
  id: A
  name: 租户与组织

business_meaning: >
  租户指标快照事实表，记录某个租户在某个快照日期的规模、内容、存储、收入、消息量和当日活跃用户等状态指标。
  该表适合做租户总览、租户规模趋势、租户分层分析和租户日度状态监控。
  当前验证显示该表可作为正式快照分析事实表使用。

grain: >
  一行代表一个 tenant 在一个 snapshot_date 的指标快照。
  当前验证显示主键候选 tenant_id + snapshot_date 唯一：
  row_count = 141684，distinct_primary_key_count = 141684，duplicate_primary_key_count = 0。
  该表是快照表，不是事件流水表。
  同一个 tenant_id 可以在多个 snapshot_date 出现。
  total_users、total_docs、total_revenue、total_messages 等字段是快照状态值，跨多个日期直接 SUM 会重复累计。
  按日期分析时应关注每个 snapshot_date 的 tenant 覆盖数量。

primary_key: []

natural_key_candidate:
  - tenant_id
  - snapshot_date

natural_key_status:
  validation_status: passed
  is_unique: true
  tested_key:
    - tenant_id
    - snapshot_date
  duplicated_group_count: 0
  note: >
    tenant_id + snapshot_date 已验证唯一，可作为该快照表的业务唯一键 / grain key。
    但它是复合业务键，不是单列物理主键。

profile:
  row_count: 141684
  column_count: 8
  source_profile_file: outputs/profiles/table_profile.json
  source_column_profile_file: outputs/profiles/column_profile.json
  validation_file: outputs/knowledge/validation/fact_tenant_metrics_snapshot_validation.md
  profile_status: validated

columns:
