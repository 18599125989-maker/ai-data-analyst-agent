    type: varchar
    semantic_type: foreign_key
    business_meaning: >
      租户 ID。
      用于将快照指标关联到租户维度，并进一步补充国家、行业、规模等租户画像信息。
    references: dim_tenant.tenant_id
    validation_status: passed
    profile:
      null_rate: 0.0
      distinct_count: 500
      distinct_rate: 0.0035
      min: T00001
      max: T00500
      sample_values:
        - T00001
        - T00002
        - T00003
        - T00004
        - T00005
      is_possible_primary_key: false
    notes:
      - >
        tenant_id 外键覆盖率已验证通过，unmatched_count = 0。
      - >
        统计租户数时应使用 COUNT(DISTINCT tenant_id)。

  snapshot_date:
    type: date
    semantic_type: snapshot_date
    business_meaning: >
      快照日期。
      表示该行租户状态指标所对应的观测日期。
    references: null
