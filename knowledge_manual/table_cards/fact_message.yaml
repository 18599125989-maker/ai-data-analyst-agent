sql_patterns:
  time_distribution: "SELECT\n sent_at AS time_key,\n COUNT(*) AS row_count\nFROM fact_message\nGROUP BY sent_at\nORDER BY sent_at;"
  enum_distribution: "SELECT\n msg_type,\n COUNT(DISTINCT msg_id) AS entity_count\nFROM fact_message\nGROUP BY msg_type\nORDER BY entity_count DESC, msg_type;"
  metric_trend: "SELECT\n sent_at AS time_key,\n ROUND(SUM(word_count), 2) AS total_word_count\nFROM fact_message\nGROUP BY sent_at\nORDER BY sent_at;"
  join_coverage_sample: "SELECT\n COUNT(*) AS row_count\nFROM fact_message base\nLEFT JOIN dim_channel ref\n ON base.channel_id = ref.channel_id;"
