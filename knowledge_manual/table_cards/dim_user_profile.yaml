validation_checks:
  - basic_table_profile
  - column_count
  - primary_key_uniqueness
  - duplicated_primary_key_examples
  - main_foreign_key_coverage_checks
  - enum_distribution_checks
  - main_sql_patterns_execution_checks
sql_patterns:
  profile_record_count: |
    SELECT COUNT(*) AS profile_record_count
    FROM dim_user_profile;
  profile_user_count: |
    SELECT COUNT(DISTINCT user_id) AS profile_user_count
    FROM dim_user_profile;
  duplicate_user_profile_summary: |
    SELECT
        user_id,
        COUNT(*) AS row_count,
        COUNT(DISTINCT language) AS distinct_language_count,
        COUNT(DISTINCT timezone) AS distinct_timezone_count,
        COUNT(DISTINCT device_os) AS distinct_device_os_count
    FROM dim_user_profile
    GROUP BY user_id
    HAVING COUNT(*) > 1
    ORDER BY row_count DESC, user_id
    LIMIT 100;
  user_count_by_language: |
    SELECT
        language,
        COUNT(DISTINCT user_id) AS user_count
    FROM dim_user_profile
    GROUP BY language
    ORDER BY user_count DESC, language;
  user_count_by_timezone: |
    SELECT
        timezone,
        COUNT(DISTINCT user_id) AS user_count
    FROM dim_user_profile
    GROUP BY timezone
    ORDER BY user_count DESC, timezone;
  user_count_by_device_os: |
    SELECT
        device_os,
        COUNT(DISTINCT user_id) AS user_count
    FROM dim_user_profile
    GROUP BY device_os
    ORDER BY user_count DESC, device_os;
  multi_device_user_count: |
    SELECT
        COUNT(*) AS multi_device_user_count
    FROM (
        SELECT user_id
        FROM dim_user_profile
        GROUP BY user_id
        HAVING COUNT(DISTINCT device_os) > 1
    );
  profile_by_tenant: |
    SELECT
        u.tenant_id,
        COUNT(*) AS profile_record_count,
        COUNT(DISTINCT p.user_id) AS profile_user_count
    FROM dim_user_profile p
    JOIN dim_user u
      ON p.user_id = u.user_id
    GROUP BY u.tenant_id
    ORDER BY profile_user_count DESC, profile_record_count DESC;
prompt_summary: >
  dim_user_profile 是用户 profile / device preference 记录表，不是一人一行的唯一用户维表。
  user_id 可 JOIN dim_user.user_id，但 user_id 本身不唯一。
  统计 profile 记录数用 COUNT(*)，统计用户数必须 COUNT(DISTINCT user_id)。
  多数重复 user_id 体现为 device_os 不同，说明用户可能有多设备记录。
  当前没有 updated_at 或 is_primary_device，不能默认取“最新”或“主设备”。
