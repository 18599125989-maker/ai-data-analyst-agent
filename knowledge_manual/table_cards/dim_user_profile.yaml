      distinct_rate: 0.0001
      min: de-DE
      max: zh-CN
      sample_values:
        - ja-JP
        - pt-BR
        - de-DE
        - zh-CN
        - en-US
      is_possible_primary_key: false
    notes:
      - >
        language 无空值。
      - >
        可用于语言偏好分析。
  timezone:
    type: varchar
    semantic_type: enum_dimension
    business_meaning: >
      用户时区偏好。
    references: null
