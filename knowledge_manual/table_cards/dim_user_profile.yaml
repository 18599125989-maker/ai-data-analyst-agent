        - Asia/Seoul
        - Asia/Shanghai
      is_possible_primary_key: false
    notes:
      - >
        timezone 无空值。
      - >
        可用于时区分析。
  device_os:
    type: varchar
    semantic_type: enum_dimension
    business_meaning: >
      用户设备系统。
    references: null
    profile:
      null_rate: 0.0
      distinct_count: 5
      distinct_rate: 0.0001
