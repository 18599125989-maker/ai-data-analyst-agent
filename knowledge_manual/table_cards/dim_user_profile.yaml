join_keys:
  - column: user_id
    references: dim_user.user_id
    relationship: many_to_one
    join_condition: dim_user_profile.user_id = dim_user.user_id
    purpose: >
      将 profile 记录关联到用户主维表。
    risk_level: low
    validation_status: passed
    note: >
      user_id 外键覆盖率 100%，unmatched_count = 0。
derived_join_paths:
  profile_to_tenant:
    path:
      - dim_user_profile.user_id = dim_user.user_id
      - dim_user.tenant_id = dim_tenant.tenant_id
    purpose: 将用户 profile 记录关联到租户维度
    risk_level: medium
    validation_status: pending_or_passed_if_already_checked
    note: >
      一个用户可能有多条 profile 记录。按租户统计用户数时应使用 COUNT(DISTINCT user_id)。
field_groups:
  id_columns:
    - user_id
  time_columns: []
  metric_columns: []
  dimension_columns:
    - user_id
    - language
    - timezone
    - device_os
    - app_version
  enum_columns:
    - language
    - timezone
    - device_os
  json_columns: []
  text_columns:
    - app_version
recommended_use_cases:
  - 分析用户语言偏好分布
  - 分析用户时区分布
  - 分析设备系统分布与多设备用户
  - 结合 dim_user / dim_tenant 做租户级画像分析
preferred_metrics:
  profile_record_count:
    expression: COUNT(*)
    meaning: profile 记录数
  profile_user_count:
    expression: COUNT(DISTINCT user_id)
    meaning: 有 profile 记录的用户数
  user_count_by_language:
    expression: COUNT(DISTINCT user_id) GROUP BY language
    meaning: 按语言分组的用户数
  user_count_by_timezone:
    expression: COUNT(DISTINCT user_id) GROUP BY timezone
    meaning: 按时区分组的用户数
  user_count_by_device_os:
    expression: COUNT(DISTINCT user_id) GROUP BY device_os
    meaning: 按设备系统分组的用户数
  multi_profile_user_count:
    expression: COUNT(*) over users where COUNT(*) > 1
    meaning: 拥有多条 profile 记录的用户数
known_traps:
  - trap: >
      不要把 dim_user_profile 当作一人一行的用户维表。
    consequence: >
      会把多 profile / 多设备用户误当成唯一用户画像，导致维度解释错误。
    prevention: >
      先确认分析目标是 profile 记录还是用户实体；用户数使用 COUNT(DISTINCT user_id)。
  - trap: >
      JOIN dim_user_profile 后直接用 COUNT(*) 当用户数。
    consequence: >
      COUNT(*) 是 profile 记录数，不是用户数。
    prevention: >
      统计用户数必须 COUNT(DISTINCT user_id)。
  - trap: >
      按 device_os 分析时假设一个用户只会出现在一个 device_os 组中。
    consequence: >
      多设备用户会同时出现在多个 device_os 组，分组用户数不能简单相加解释为总用户数。
    prevention: >
      明确 device_os 口径是“在该设备系统上出现过的用户数”。
  - trap: >
      如果需要一人一条画像，直接默认取一条记录。
    consequence: >
      当前没有 updated_at 或 is_primary_device，任意选取会导致口径不稳定。
    prevention: >
      必须先定义去重策略；当前不能默认取最新或主设备。
  - trap: >
      随机使用 ANY_VALUE(device_os) 当用户主设备。
    consequence: >
      会构造出不稳定且不可解释的主设备标签。
    prevention: >
      除非用户明确接受这种近似，否则不要用 ANY_VALUE(device_os) 代表主设备。
aggregation_notes:
  - >
    profile 记录数使用 COUNT(*)。
  - >
    用户数使用 COUNT(DISTINCT user_id)。
  - >
    该表不能直接作为唯一用户维表参与一对一 JOIN 假设。
  - >
    如果要做一人一条画像分析，必须先定义并执行去重策略。
