table_name: dim_user_profile
card_version: v1
card_type: table_card
domain:
  id: B
  name: 用户
business_meaning: >
  用户 profile / device preference 记录表。
  用于描述用户的语言偏好、时区、设备系统和客户端版本分布，
  更适合做用户画像分层和设备偏好分析，而不是作为唯一用户维表。
grain: >
  一行代表一个用户的一条 profile/device preference 记录。
  user_id 不唯一，不能把该表当作一人一行的用户维表。
  重复 user_id 多数是 device_os 不同，可能表示一人多设备。
  也存在部分完全重复 profile 行。
  当前缺少 updated_at / version / is_primary_device 字段，无法判断最新画像或主设备。
primary_key: []
natural_key_candidate:
  - user_id
natural_key_status:
  validation_status: failed
  is_unique: false
  duplicate_user_id_count: 2500
  note: >
    user_id 不唯一，因此不能作为严格主键。
    该表是 profile/device preference 记录表，不是一人一行的用户维表。
profile:
  row_count: 52500
  column_count: 5
  source_profile_file: outputs/profiles/table_profile.json
  source_column_profile_file: outputs/profiles/column_profile.json
  validation_file: outputs/knowledge/validation/dim_user_profile_validation.md
  profile_status: validated_with_warnings
columns:
  user_id:
    type: varchar
    semantic_type: foreign_key
    business_meaning: >
      用户 ID。
    references: dim_user.user_id
    validation_status: passed
    profile:
      null_rate: 0.0
      distinct_count: 50000
      distinct_rate: 0.9524
      min: U000001
      max: U050000
      sample_values:
        - U000001
        - U000002
        - U000003
        - U000004
        - U000005
      is_possible_primary_key: false
    notes:
      - >
        user_id 外键覆盖率 100%，全部可关联 dim_user.user_id。
      - >
        user_id 不唯一，不能把该表当作一人一行的用户维表。
  language:
