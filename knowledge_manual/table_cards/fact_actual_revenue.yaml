validation_checks:
  grain_checks:
    - check_name: revenue_id_uniqueness
      description: >
        检查 revenue_id 是否唯一，验证主键是否成立。
      sql: |
        SELECT
            COUNT(*) AS row_count,
            COUNT(DISTINCT revenue_id) AS distinct_revenue_id_count,
            COUNT(*) - COUNT(DISTINCT revenue_id) AS duplicate_revenue_id_count
        FROM fact_actual_revenue;

    - check_name: sub_id_month_uniqueness
      description: >
        检查 sub_id + month 是否唯一，验证自然业务粒度是否成立。
      sql: |
        SELECT
            COUNT(*) AS duplicated_key_groups
        FROM (
            SELECT
                sub_id,
                month,
                COUNT(*) AS duplicate_count
            FROM fact_actual_revenue
            GROUP BY sub_id, month
            HAVING COUNT(*) > 1
        );

    - check_name: tenant_sub_id_month_uniqueness
      description: >
        检查 tenant_id + sub_id + month 是否唯一，验证订阅月份级自然键是否严格成立。
      sql: |
        SELECT
            COUNT(*) AS duplicated_key_groups
        FROM (
            SELECT
                tenant_id,
                sub_id,
                month,
                COUNT(*) AS duplicate_count
            FROM fact_actual_revenue
            GROUP BY tenant_id, sub_id, month
            HAVING COUNT(*) > 1
        );

    - check_name: exact_duplicate_row_check
      description: >
        检查重复的 tenant_id + sub_id + month 是否存在完全重复行。
      sql: |
        SELECT
            tenant_id,
            sub_id,
            month,
            seats,
            list_price_per_seat,
            list_revenue,
            discount_rate,
            coupon_amount,
            actual_revenue,
            currency,
            COUNT(*) AS duplicate_count
        FROM fact_actual_revenue
        GROUP BY
            tenant_id,
            sub_id,
            month,
            seats,
            list_price_per_seat,
            list_revenue,
            discount_rate,
            coupon_amount,
            actual_revenue,
            currency
        HAVING COUNT(*) > 1
        ORDER BY duplicate_count DESC;

  dq_checks:
    - check_name: tenant_id_fk_coverage
      description: >
        检查 fact_actual_revenue.tenant_id 是否都能关联到 dim_tenant.tenant_id。
      sql: |
        SELECT
            COUNT(*) AS unmatched_revenue_tenant_count
        FROM fact_actual_revenue r
        LEFT JOIN dim_tenant t
            ON r.tenant_id = t.tenant_id
        WHERE t.tenant_id IS NULL;

    - check_name: sub_id_fk_coverage
      description: >
        检查 fact_actual_revenue.sub_id 是否都能关联到 fact_subscription.sub_id。
      sql: |
        SELECT
            COUNT(*) AS unmatched_revenue_sub_count
        FROM fact_actual_revenue r
        LEFT JOIN fact_subscription s
            ON r.sub_id = s.sub_id
        WHERE s.sub_id IS NULL;

    - check_name: currency_distribution
      description: >
        检查 currency 的取值分布。
      sql: |
        SELECT
            currency,
            COUNT(*) AS row_count
        FROM fact_actual_revenue
        GROUP BY currency
        ORDER BY row_count DESC;

    - check_name: revenue_formula_relative_diff
      description: >
        检查 actual_revenue 与近似公式之间的平均绝对偏差、最大绝对偏差和平均相对偏差。
      sql: |
        SELECT
            COUNT(*) AS row_count,
            ROUND(
                AVG(
                    ABS(actual_revenue - (list_revenue * (1 - discount_rate) - coupon_amount))
                ),
                4
            ) AS avg_abs_diff,
            ROUND(
                MAX(
                    ABS(actual_revenue - (list_revenue * (1 - discount_rate) - coupon_amount))
                ),
                4
            ) AS max_abs_diff,
            ROUND(
                AVG(
                    ABS(actual_revenue - (list_revenue * (1 - discount_rate) - coupon_amount))
                    / NULLIF(actual_revenue, 0)
                ),
                6
            ) AS avg_relative_diff
        FROM fact_actual_revenue;

    - check_name: negative_and_abnormal_value_check
      description: >
        检查是否存在负收入、负席位、负优惠券或异常折扣率。
      sql: |
        SELECT
            SUM(CASE WHEN actual_revenue < 0 THEN 1 ELSE 0 END) AS negative_actual_revenue_count,
            SUM(CASE WHEN list_revenue < 0 THEN 1 ELSE 0 END) AS negative_list_revenue_count,
            SUM(CASE WHEN seats < 0 THEN 1 ELSE 0 END) AS negative_seats_count,
            SUM(CASE WHEN coupon_amount < 0 THEN 1 ELSE 0 END) AS negative_coupon_amount_count,
            SUM(CASE WHEN discount_rate < 0 OR discount_rate > 1 THEN 1 ELSE 0 END) AS abnormal_discount_rate_count
        FROM fact_actual_revenue;

    - check_name: month_distribution
      description: >
        检查 month 的取值范围和每月记录数。
      sql: |
        SELECT
            month,
            COUNT(*) AS row_count,
            COUNT(DISTINCT sub_id) AS subscription_count,
            ROUND(SUM(list_revenue), 2) AS list_revenue,
            ROUND(SUM(actual_revenue), 2) AS actual_revenue,
            ROUND(SUM(list_revenue - actual_revenue), 2) AS revenue_gap
        FROM fact_actual_revenue
        GROUP BY month
        ORDER BY month;

sql_patterns:
  monthly_actual_revenue_trend: |
    SELECT
        month,
        COUNT(DISTINCT revenue_id) AS revenue_record_count,
        ROUND(SUM(list_revenue), 2) AS list_revenue,
        ROUND(SUM(actual_revenue), 2) AS actual_revenue,
        ROUND(SUM(list_revenue - actual_revenue), 2) AS revenue_gap
    FROM fact_actual_revenue
    GROUP BY month
    ORDER BY month;

  actual_revenue_by_plan_month: |
    SELECT
        s.plan_tier,
        r.month,
        COUNT(DISTINCT r.sub_id) AS subscription_count,
        COUNT(DISTINCT r.revenue_id) AS revenue_record_count,
        SUM(r.seats) AS total_seats,
        ROUND(SUM(r.list_revenue), 2) AS list_revenue,
        ROUND(SUM(r.actual_revenue), 2) AS actual_revenue,
        ROUND(SUM(r.list_revenue - r.actual_revenue), 2) AS revenue_gap
    FROM fact_actual_revenue r
    LEFT JOIN fact_subscription s
        ON r.sub_id = s.sub_id
    WHERE r.month = '2025-10'
    GROUP BY s.plan_tier, r.month
    ORDER BY actual_revenue DESC;

  discount_impact_by_plan_month: |
    SELECT
        s.plan_tier,
        r.month,
        ROUND(SUM(r.list_revenue), 2) AS list_revenue,
        ROUND(SUM(r.coupon_amount), 2) AS coupon_amount,
        ROUND(SUM(r.list_revenue * r.discount_rate), 2) AS estimated_discount_amount,
        ROUND(SUM(r.list_revenue - r.actual_revenue), 2) AS total_revenue_gap,
        ROUND(
            SUM(r.list_revenue - r.actual_revenue) / NULLIF(SUM(r.list_revenue), 0),
            4
        ) AS revenue_gap_rate
    FROM fact_actual_revenue r
    LEFT JOIN fact_subscription s
        ON r.sub_id = s.sub_id
    WHERE r.month = '2025-10'
    GROUP BY s.plan_tier, r.month
    ORDER BY total_revenue_gap DESC;

  actual_revenue_by_tenant_profile: |
    SELECT
        t.country,
        t.industry,
        t.size_tier,
        r.month,
        COUNT(DISTINCT r.tenant_id) AS tenant_count,
        COUNT(DISTINCT r.revenue_id) AS revenue_record_count,
        ROUND(SUM(r.actual_revenue), 2) AS actual_revenue
    FROM fact_actual_revenue r
    LEFT JOIN dim_tenant t
        ON r.tenant_id = t.tenant_id
    WHERE r.month = '2025-10'
    GROUP BY t.country, t.industry, t.size_tier, r.month
    ORDER BY actual_revenue DESC;

  subscription_month_level_revenue: |
    SELECT
        tenant_id,
        sub_id,
        month,
        COUNT(DISTINCT revenue_id) AS revenue_record_count,
        SUM(seats) AS total_seats,
        ROUND(SUM(list_revenue), 2) AS list_revenue,
        ROUND(SUM(actual_revenue), 2) AS actual_revenue,
        ROUND(SUM(list_revenue - actual_revenue), 2) AS revenue_gap
    FROM fact_actual_revenue
    GROUP BY tenant_id, sub_id, month
    ORDER BY month, tenant_id, sub_id;

prompt_summary: >
  fact_actual_revenue 是月度实收收入事实表。revenue_id 是唯一物理主键。
  actual_revenue 是实际入账收入；list_revenue 是标价收入；
  revenue_gap 可用 list_revenue - actual_revenue 计算。
  如果用户问实收、实际收入、入账收入，应优先使用 actual_revenue。
  如果按套餐分析，需要通过 sub_id JOIN fact_subscription 获取 plan_tier。
  不要将 actual_revenue 与 MRR、发票金额或付款金额混用。
  当前验证发现 tenant_id + sub_id + month 有 15 组重复，但这些不是脏重复；
  它们是同一订阅同月下不同 discount_rate / actual_revenue 的收入明细。
  因此 Agent 不能删除这些记录，也不能只取一条；
  订阅月份级和月度收入分析必须 SUM(actual_revenue)。
  当前验证还发现 actual_revenue 公式有极小相对偏差，
  因此不要重新计算 actual_revenue 替代表字段。

