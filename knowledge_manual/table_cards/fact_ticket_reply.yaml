sql_patterns:
  reply_count_by_author_type: |
    SELECT
        author_type,
        COUNT(DISTINCT reply_id) AS reply_record_count
    FROM fact_ticket_reply
    GROUP BY author_type
    ORDER BY reply_record_count DESC, author_type;
  reply_trend_by_day: |
    SELECT
        CAST(replied_at AS DATE) AS dt,
        COUNT(DISTINCT reply_id) AS reply_record_count,
        COUNT(DISTINCT ticket_id) AS replied_ticket_count
    FROM fact_ticket_reply
    GROUP BY CAST(replied_at AS DATE)
    ORDER BY dt;
  reply_trend_by_month: |
    SELECT
        STRFTIME(replied_at, '%Y-%m') AS month_key,
        COUNT(DISTINCT reply_id) AS reply_record_count,
        COUNT(DISTINCT ticket_id) AS replied_ticket_count
    FROM fact_ticket_reply
    GROUP BY STRFTIME(replied_at, '%Y-%m')
    ORDER BY month_key;
  avg_content_length_by_author_type: |
    SELECT
        author_type,
        AVG(content_length) AS avg_content_length,
        SUM(content_length) AS total_content_length
    FROM fact_ticket_reply
    GROUP BY author_type
    ORDER BY avg_content_length DESC, author_type;
  reply_count_by_ticket: |
    SELECT
        ticket_id,
        COUNT(DISTINCT reply_id) AS reply_record_count
    FROM fact_ticket_reply
    GROUP BY ticket_id
    ORDER BY reply_record_count DESC, ticket_id;
  reply_count_by_tenant: |
    SELECT
        t.tenant_id,
        COUNT(DISTINCT r.reply_id) AS reply_record_count,
        COUNT(DISTINCT r.ticket_id) AS replied_ticket_count
    FROM fact_ticket_reply r
    JOIN fact_ticket t
      ON r.ticket_id = t.ticket_id
    GROUP BY t.tenant_id
    ORDER BY reply_record_count DESC, t.tenant_id;
  bot_vs_agent_reply_share: |
    SELECT
        author_type,
        COUNT(DISTINCT reply_id) AS reply_record_count,
        ROUND(
            100.0 * COUNT(DISTINCT reply_id)
            / SUM(COUNT(DISTINCT reply_id)) OVER (),
            2
        ) AS reply_share_pct
    FROM fact_ticket_reply
    WHERE author_type IN ('agent', 'bot')
    GROUP BY author_type
    ORDER BY reply_record_count DESC, author_type;

prompt_summary: >
  fact_ticket_reply 是工单回复事实表，一行代表一条 reply_id 级回复记录，主键已验证唯一。
  ticket_id 可稳定关联到 fact_ticket，再进一步关联租户或用户维度；但一个工单可以有多条回复。
  关键指标包括回复记录数、有回复工单数、平均回复长度和不同 author_type 的回复分布。
  关键陷阱是不要把 COUNT(*) 当作工单数，不要把 author_type 当成 metric，不要把 content_length 直接解释为服务质量，
  并且月度趋势中应把 2026-04 视为可能不完整月份。

