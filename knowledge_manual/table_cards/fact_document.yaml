sql_patterns:
  time_distribution: "SELECT\n created_at AS time_key,\n COUNT(*) AS row_count\nFROM fact_document\nGROUP BY created_at\nORDER BY created_at;"
  enum_distribution: "SELECT\n doc_type,\n COUNT(DISTINCT doc_id) AS entity_count\nFROM fact_document\nGROUP BY doc_type\nORDER BY entity_count DESC, doc_type;"
  metric_trend: "SELECT\n created_at AS time_key,\n ROUND(SUM(edit_count), 2) AS total_edit_count\nFROM fact_document\nGROUP BY created_at\nORDER BY created_at;"
  join_coverage_sample: "SELECT\n COUNT(*) AS row_count\nFROM fact_document base\nLEFT JOIN dim_tenant ref\n ON base.tenant_id = ref.tenant_id;"
