sql_patterns:
  activation_count_by_milestone_type: |
    SELECT
        milestone_type,
        COUNT(DISTINCT (user_id, milestone_type, reached_at)) AS activation_record_count
    FROM fact_user_activation
    GROUP BY milestone_type
    ORDER BY activation_record_count DESC, milestone_type;
  activated_user_count_by_milestone_type: |
    SELECT
        milestone_type,
        COUNT(DISTINCT user_id) AS activated_user_count
    FROM fact_user_activation
    GROUP BY milestone_type
    ORDER BY activated_user_count DESC, milestone_type;
  activation_trend_by_month: |
    SELECT
        STRFTIME(reached_at, '%Y-%m') AS month_key,
        COUNT(DISTINCT user_id) AS activated_user_count,
        COUNT(DISTINCT (user_id, milestone_type, reached_at)) AS activation_record_count
    FROM fact_user_activation
    GROUP BY STRFTIME(reached_at, '%Y-%m')
    ORDER BY month_key;
  activation_trend_by_day: |
    SELECT
        CAST(reached_at AS DATE) AS dt,
        COUNT(DISTINCT user_id) AS activated_user_count,
        COUNT(DISTINCT (user_id, milestone_type, reached_at)) AS activation_record_count
    FROM fact_user_activation
    GROUP BY CAST(reached_at AS DATE)
    ORDER BY dt;
  activation_by_tenant: |
    SELECT
        u.tenant_id,
        COUNT(DISTINCT a.user_id) AS activated_user_count,
        COUNT(DISTINCT (a.user_id, a.milestone_type, a.reached_at)) AS activation_record_count
    FROM fact_user_activation a
    JOIN dim_user u
      ON a.user_id = u.user_id
    GROUP BY u.tenant_id
    ORDER BY activated_user_count DESC, u.tenant_id;
  activation_funnel_by_tenant_profile: |
    SELECT
        t.country,
        t.industry,
        t.size_tier,
        a.milestone_type,
        COUNT(DISTINCT a.user_id) AS activated_user_count
    FROM fact_user_activation a
    JOIN dim_user u
      ON a.user_id = u.user_id
    JOIN dim_tenant t
      ON u.tenant_id = t.tenant_id
    GROUP BY t.country, t.industry, t.size_tier, a.milestone_type
    ORDER BY activated_user_count DESC, t.country, t.industry, t.size_tier, a.milestone_type;

prompt_summary: >
  fact_user_activation 是用户激活里程碑事实表，一行代表一个用户达成一个 milestone_type 的记录。
  当前验证显示主键候选 user_id + milestone_type + reached_at 唯一，user_id 到 dim_user 的关联覆盖率为 100%。
  常用路径为 user_id -> dim_user -> dim_tenant。
  关键指标包括激活记录数、激活用户数和里程碑类型数；其中用户数必须用 COUNT(DISTINCT user_id)。
  关键陷阱是不要把 milestone_type 当成 metric，不要假设一个用户只有一条记录，并且激活趋势必须使用 reached_at。

