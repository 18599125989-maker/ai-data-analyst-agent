  time_distribution: "SELECT\n issued_at AS time_key,\n COUNT(*) AS row_count\nFROM fact_invoice\nGROUP BY issued_at\nORDER BY issued_at;"
  enum_distribution: "SELECT\n currency,\n COUNT(DISTINCT invoice_id) AS entity_count\nFROM fact_invoice\nGROUP BY currency\nORDER BY entity_count DESC, currency;"
  metric_trend: "SELECT\n issued_at AS time_key,\n ROUND(SUM(amount), 2) AS total_amount\nFROM fact_invoice\nGROUP BY issued_at\nORDER BY issued_at;"
  join_coverage_sample: "SELECT\n COUNT(*) AS row_count\nFROM fact_invoice base\nLEFT JOIN dim_tenant ref\n ON base.tenant_id = ref.tenant_id;"
