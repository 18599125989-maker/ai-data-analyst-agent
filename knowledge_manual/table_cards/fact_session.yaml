table_name: fact_session
card_version: v1.0
card_type: table_card

domain:
  id: C
  name: 产品使用

business_meaning: >
  用户会话事实表，记录用户一次从开始到结束的访问或登录会话。
  该表适合分析登录/访问会话数、活跃用户数、设备分布、国家分布和会话时长。
  当前验证显示该表可作为正式会话分析事实表使用。

grain: >
  一行代表一次用户 session。
  当前验证显示主键候选 session_id 唯一：row_count = 1269417，
  distinct_primary_key_count = 1269417，duplicate_primary_key_count = 0。
  同一个 user_id 可以有多条 session。
  该表适合分析登录/访问会话数、活跃用户数、设备分布、国家分布和会话时长。

primary_key:
  - session_id

natural_key_candidate:
  - session_id

natural_key_status:
  is_unique: true
  tested_key:
    - session_id
  duplicated_group_count: 0
  note: >
    当前验证显示 session_id 唯一，可作为本表的物理主键和会话级唯一标识。

