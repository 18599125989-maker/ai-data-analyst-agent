join_keys:
  - column: user_id
    references: dim_user.user_id
    relationship: many_to_one
    join_condition: fact_session.user_id = dim_user.user_id
    purpose: 将 session 记录关联到用户维度。
    risk_level: low
    validation_status: passed
    note: >
      user_id 外键覆盖率已验证通过，unmatched_count = 0。

derived_join_paths:
  session_to_tenant:
    path:
      - fact_session.user_id = dim_user.user_id
      - dim_user.tenant_id = dim_tenant.tenant_id
    purpose: 将 session 记录关联到租户维度
    risk_level: low
    validation_status: passed
    note: >
      同一用户可以有多条 session，按租户统计用户数时应 COUNT(DISTINCT user_id)，统计 session 数时才 COUNT(DISTINCT session_id)。

field_groups:
  id_columns:
    - session_id
    - user_id
  time_columns:
    - start_time
    - end_time
  metric_columns: []
  dimension_columns:
    - user_id
    - device
    - ip_country
  enum_columns:
    - device
    - ip_country
  json_columns: []
  text_columns: []

recommended_use_cases:
  - 统计 session 数和活跃用户数。
  - 分析不同设备和访问国家的 session 分布。
  - 按日或按月分析 session 趋势。
  - 计算平均 session 时长和总 session 时长。
  - 结合 dim_user 和 dim_tenant 分析不同租户或用户群体的访问会话情况。

preferred_metrics:
  session_count:
    expression: COUNT(DISTINCT session_id)
    meaning: session 数
    applicable_grain: 任意分析层级
    note: >
      统计 session 数应使用 session_id 去重，或在确认无重复时使用 COUNT(*)。
  active_user_count:
    expression: COUNT(DISTINCT user_id)
    meaning: 有 session 的活跃用户数
    applicable_grain: 任意分析层级
    note: >
      用户数和 session 数不能混用。
  avg_session_duration_sec:
    expression: AVG(DATEDIFF('second', start_time, end_time))
    meaning: 平均 session 时长秒数
    applicable_grain: 任意分析层级
    note: >
      使用 start_time 与 end_time 计算时长。
  total_session_duration_sec:
    expression: SUM(DATEDIFF('second', start_time, end_time))
    meaning: 总 session 时长秒数
    applicable_grain: 任意分析层级
    note: >
      可用于分析总体访问时长规模。
  device_count:
    expression: COUNT(DISTINCT device)
    meaning: 设备类型数
    applicable_grain: 任意分析层级
    note: >
      device 是分组维度，不是数值指标。
  ip_country_count:
    expression: COUNT(DISTINCT ip_country)
    meaning: 访问来源国家数
    applicable_grain: 任意分析层级
    note: >
      ip_country 表示访问来源国家，不等同于租户注册国家。

known_traps:
  - trap: >
      直接 COUNT(*) 当作用户数。
    consequence: >
      COUNT(*) 是 session 记录数，不是用户数。
    prevention: >
      统计用户数使用 COUNT(DISTINCT user_id)，统计 session 数使用 COUNT(DISTINCT session_id) 或 COUNT(*)。
  - trap: >
      把 device 或 ip_country 当作数值指标。
    consequence: >
      device 和 ip_country 是枚举维度，不能 SUM 或 AVG。
    prevention: >
      device/ip_country 只能作为分组或筛选维度。
  - trap: >
      把 ip_country 等同于租户注册国家。
    consequence: >
      ip_country 来自访问 IP，可能与 dim_tenant.country 不同。
    prevention: >
      分析访问来源国家用 ip_country；分析企业注册或所属国家用 dim_tenant.country。
  - trap: >
      计算 session 时长时没有使用 end_time - start_time。
    consequence: >
      无法得到正确会话时长。
    prevention: >
      使用 DATEDIFF('second', start_time, end_time) 计算 session_duration_sec。
  - trap: >
      JOIN page_view/event_log 后直接 COUNT(*) 当作 session 数。
    consequence: >
      一个 session 可能对应多个 page view 或 event，JOIN 后会放大 session 行数。
    prevention: >
      JOIN 后统计 session 数使用 COUNT(DISTINCT session_id)。

aggregation_notes:
  - >
    统计 session 数用 COUNT(DISTINCT session_id)。
  - >
    统计用户数用 COUNT(DISTINCT user_id)。
  - >
    计算时长用 DATEDIFF('second', start_time, end_time)。
  - >
    ip_country 不等于 dim_tenant.country，跨表解释时要区分访问来源与租户属性。

