sql_patterns:
  session_count_by_day: |
    SELECT
        CAST(start_time AS DATE) AS dt,
        COUNT(DISTINCT session_id) AS session_count
    FROM fact_session
    GROUP BY CAST(start_time AS DATE)
    ORDER BY dt;
  session_count_by_month: |
    SELECT
        STRFTIME(start_time, '%Y-%m') AS month_key,
        COUNT(DISTINCT session_id) AS session_count
    FROM fact_session
    GROUP BY STRFTIME(start_time, '%Y-%m')
    ORDER BY month_key;
  active_user_count_by_day: |
    SELECT
        CAST(start_time AS DATE) AS dt,
        COUNT(DISTINCT user_id) AS active_user_count
    FROM fact_session
    GROUP BY CAST(start_time AS DATE)
    ORDER BY dt;
  session_count_by_device: |
    SELECT
        device,
        COUNT(DISTINCT session_id) AS session_count
    FROM fact_session
    GROUP BY device
    ORDER BY session_count DESC, device;
  session_count_by_ip_country: |
    SELECT
        ip_country,
        COUNT(DISTINCT session_id) AS session_count
    FROM fact_session
    GROUP BY ip_country
    ORDER BY session_count DESC, ip_country;
  avg_session_duration_by_device: |
    SELECT
        device,
        AVG(DATEDIFF('second', start_time, end_time)) AS avg_session_duration_sec
    FROM fact_session
    GROUP BY device
    ORDER BY avg_session_duration_sec DESC, device;
  session_count_by_tenant: |
    SELECT
        u.tenant_id,
        COUNT(DISTINCT s.session_id) AS session_count,
        COUNT(DISTINCT s.user_id) AS active_user_count
    FROM fact_session s
    JOIN dim_user u
      ON s.user_id = u.user_id
    GROUP BY u.tenant_id
    ORDER BY session_count DESC, u.tenant_id;
  session_count_by_tenant_country: |
    SELECT
        t.country,
        COUNT(DISTINCT s.session_id) AS session_count,
        COUNT(DISTINCT s.user_id) AS active_user_count
    FROM fact_session s
    JOIN dim_user u
      ON s.user_id = u.user_id
    JOIN dim_tenant t
      ON u.tenant_id = t.tenant_id
    GROUP BY t.country
    ORDER BY session_count DESC, t.country;

