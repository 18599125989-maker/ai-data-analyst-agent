prompt_summary: >
  fact_session 是用户会话事实表，一行代表一次 session，主键 session_id 已验证唯一。
  常用路径是 user_id -> dim_user -> dim_tenant。
  关键指标包括 session 数、活跃用户数、平均会话时长和设备或访问国家分布。
  统计 session 数使用 COUNT(DISTINCT session_id)，统计用户数使用 COUNT(DISTINCT user_id)，
  会话时长通过 DATEDIFF('second', start_time, end_time) 计算。
  关键陷阱是不要把 COUNT(*) 当作用户数，不要把 device/ip_country 当作 metric，并且 ip_country 不等于租户注册国家。

