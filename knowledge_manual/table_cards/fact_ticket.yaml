prompt_summary: >
  fact_ticket 是工单主事实表，一行代表一个 ticket_id 级工单，主键已验证唯一。
  tenant_id 可稳定关联 dim_tenant，category 可稳定关联 dim_ticket_category；ticket_id 与 fact_ticket_reply 是一对多关系。
  关键指标包括工单数、不同状态和优先级工单数、未解决工单数和平均解决时长。
  关键陷阱是不要在 JOIN fact_ticket_reply 后用 COUNT(*) 当作工单数，计算解决时长必须过滤 resolved_at IS NOT NULL，
  且 priority/status 只能作为枚举维度而不是数值指标。

