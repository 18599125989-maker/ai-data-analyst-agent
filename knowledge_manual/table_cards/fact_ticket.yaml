sql_patterns:
  ticket_count_by_status: |
    SELECT
        status,
        COUNT(DISTINCT ticket_id) AS ticket_count
    FROM fact_ticket
    GROUP BY status
    ORDER BY ticket_count DESC, status;
  ticket_count_by_priority: |
    SELECT
        priority,
        COUNT(DISTINCT ticket_id) AS ticket_count
    FROM fact_ticket
    GROUP BY priority
    ORDER BY ticket_count DESC, priority;
  ticket_count_by_category: |
    SELECT
        category,
        COUNT(DISTINCT ticket_id) AS ticket_count
    FROM fact_ticket
    GROUP BY category
    ORDER BY ticket_count DESC, category;
  ticket_created_trend_by_day: |
    SELECT
        CAST(created_at AS DATE) AS dt,
        COUNT(DISTINCT ticket_id) AS ticket_count
    FROM fact_ticket
    GROUP BY CAST(created_at AS DATE)
    ORDER BY dt;
  ticket_created_trend_by_month: |
    SELECT
        STRFTIME(created_at, '%Y-%m') AS month_key,
        COUNT(DISTINCT ticket_id) AS ticket_count
    FROM fact_ticket
    GROUP BY STRFTIME(created_at, '%Y-%m')
    ORDER BY month_key;
  unresolved_ticket_count: |
    SELECT
        COUNT(DISTINCT ticket_id) AS unresolved_ticket_count
    FROM fact_ticket
    WHERE resolved_at IS NULL;
  avg_resolution_hours_by_priority: |
    SELECT
        priority,
        AVG(DATEDIFF('second', created_at, resolved_at) / 3600.0) AS avg_resolution_hours
    FROM fact_ticket
    WHERE resolved_at IS NOT NULL
    GROUP BY priority
    ORDER BY avg_resolution_hours DESC, priority;
  avg_resolution_hours_by_category: |
    SELECT
        category,
        AVG(DATEDIFF('second', created_at, resolved_at) / 3600.0) AS avg_resolution_hours
    FROM fact_ticket
    WHERE resolved_at IS NOT NULL
    GROUP BY category
    ORDER BY avg_resolution_hours DESC, category;
  ticket_count_by_tenant: |
    SELECT
        tenant_id,
        COUNT(DISTINCT ticket_id) AS ticket_count
    FROM fact_ticket
    GROUP BY tenant_id
    ORDER BY ticket_count DESC, tenant_id;
  ticket_count_by_tenant_profile: |
    SELECT
        t.country,
        t.industry,
        t.size_tier,
        COUNT(DISTINCT f.ticket_id) AS ticket_count,
        COUNT(DISTINCT f.tenant_id) AS tenant_count
    FROM fact_ticket f
    JOIN dim_tenant t
      ON f.tenant_id = t.tenant_id
    GROUP BY t.country, t.industry, t.size_tier
    ORDER BY ticket_count DESC, t.country, t.industry, t.size_tier;

