table_name: fact_ticket
card_version: v1.0
card_type: table_card

domain:
  id: F
  name: 客服工单

business_meaning: >
  客服/支持工单事实表，记录工单的企业归属、提单用户、分类、优先级、状态、创建时间和解决时间。
  该表适合分析工单数量、优先级、状态、类别、解决时长和租户支持负载。
  当前验证显示该表可作为正式工单分析事实表使用。

grain: >
  一行代表一个客服/支持工单。
  当前验证显示主键候选 ticket_id 唯一：row_count = 3922，
  distinct_primary_key_count = 3922，duplicate_primary_key_count = 0。
  同一个 ticket_id 可以在 fact_ticket_reply 中对应多条回复。
  该表适合分析工单数量、优先级、状态、类别、解决时长和租户支持负载。

primary_key:
  - ticket_id

natural_key_candidate:
  - ticket_id

natural_key_status:
  is_unique: true
  tested_key:
    - ticket_id
  duplicated_group_count: 0
  note: >
    当前验证显示 ticket_id 唯一，可作为本表主键和工单级唯一标识。

