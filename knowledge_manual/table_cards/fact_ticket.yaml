join_keys:
  - column: tenant_id
    references: dim_tenant.tenant_id
    relationship: many_to_one
    join_condition: fact_ticket.tenant_id = dim_tenant.tenant_id
    purpose: 将工单关联到租户维度。
    risk_level: low
    validation_status: passed
    note: >
      tenant_id 外键覆盖率已验证通过，unmatched_count = 0。

  - column: category
    references: dim_ticket_category.category_id
    relationship: many_to_one
    join_condition: fact_ticket.category = dim_ticket_category.category_id
    purpose: 将工单关联到工单分类维度。
    risk_level: low
    validation_status: passed
    note: >
      category 外键覆盖率已验证通过，unmatched_count = 0。

  - column: ticket_id
    references: fact_ticket_reply.ticket_id
    relationship: one_to_many
    join_condition: fact_ticket.ticket_id = fact_ticket_reply.ticket_id
    purpose: 将工单关联到回复事实表。
    risk_level: medium
    validation_status: passed
    note: >
      一个 ticket 可以有多条 reply，JOIN 后统计工单数必须 COUNT(DISTINCT ticket_id)。

field_groups:
  id_columns:
    - ticket_id
    - tenant_id
  time_columns:
    - created_at
    - resolved_at
  metric_columns: []
  dimension_columns:
    - tenant_id
    - category
    - priority
    - status
  enum_columns:
    - category
    - priority
    - status
  json_columns: []
  text_columns: []

recommended_use_cases:
  - 统计工单总量、未解决工单量和不同状态工单分布。
  - 分析不同优先级和类别下的工单压力结构。
  - 按日、按月分析工单创建趋势。
  - 计算已解决工单的平均解决时长。
  - 按租户和租户画像分析支持负载与问题类型分布。

preferred_metrics:
  ticket_count:
    expression: COUNT(DISTINCT ticket_id)
    meaning: 工单数
    applicable_grain: 任意分析层级
    note: >
      工单数量应使用 ticket_id 去重统计。
  open_ticket_count:
    expression: COUNT(DISTINCT CASE WHEN status = 'open' THEN ticket_id END)
    meaning: open 工单数
    applicable_grain: 任意分析层级
    note: >
      用于统计未处理工单数量。
  in_progress_ticket_count:
    expression: COUNT(DISTINCT CASE WHEN status = 'in_progress' THEN ticket_id END)
    meaning: 处理中工单数
    applicable_grain: 任意分析层级
    note: >
      用于统计处理中工单数量。
  resolved_ticket_count:
    expression: COUNT(DISTINCT CASE WHEN status = 'resolved' THEN ticket_id END)
    meaning: 已解决工单数
    applicable_grain: 任意分析层级
    note: >
      用于统计已解决工单数量。
  closed_ticket_count:
    expression: COUNT(DISTINCT CASE WHEN status = 'closed' THEN ticket_id END)
    meaning: 已关闭工单数
    applicable_grain: 任意分析层级
    note: >
      用于统计已关闭工单数量。
  unresolved_ticket_count:
    expression: COUNT(DISTINCT CASE WHEN resolved_at IS NULL THEN ticket_id END)
    meaning: 未解决或无解决时间工单数
    applicable_grain: 任意分析层级
    note: >
      需结合 status 理解未解决或未关闭状态。
  avg_resolution_hours:
    expression: AVG(DATEDIFF('second', created_at, resolved_at) / 3600.0)
    meaning: 平均解决时长小时数
    applicable_grain: resolved_at 非空的工单
    note: >
      使用前必须过滤 WHERE resolved_at IS NOT NULL。

known_traps:
  - trap: >
      JOIN fact_ticket_reply 后直接 COUNT(*) 当作工单数。
    consequence: >
      一个 ticket_id 可以对应多条回复，COUNT(*) 会统计回复记录数，不是工单数。
    prevention: >
      统计工单数使用 COUNT(DISTINCT ticket_id)，统计回复数才使用 fact_ticket_reply 的记录数。
  - trap: >
      计算解决时长时没有过滤 resolved_at IS NOT NULL。
    consequence: >
      未解决或未关闭工单的 resolved_at 为空，会导致解决时长为空或计算错误。
    prevention: >
      计算解决时长时使用 WHERE resolved_at IS NOT NULL，并根据 status 说明统计口径。
  - trap: >
      把 resolved_at 为空当作数据质量错误。
    consequence: >
      会误判 open / in_progress 等未解决工单。
    prevention: >
      resolved_at 为空通常代表尚未解决或未关闭，需要结合 status 解释。
  - trap: >
      把 priority 或 status 当作数值指标。
    consequence: >
      priority/status 是枚举维度，不能 SUM 或 AVG。
    prevention: >
      priority/status 只能作为分组或筛选维度。
  - trap: >
      JOIN dim_tenant 后直接 COUNT(*) 当作企业数。
    consequence: >
      COUNT(*) 是工单记录数，不是企业数。
    prevention: >
      统计企业数使用 COUNT(DISTINCT tenant_id)。

aggregation_notes:
  - >
    统计工单数时使用 COUNT(DISTINCT ticket_id)。
  - >
    计算解决时长前必须过滤 resolved_at IS NOT NULL。
  - >
    与 fact_ticket_reply JOIN 后不能用 COUNT(*) 作为工单数。

