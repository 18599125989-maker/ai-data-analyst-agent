    notes:
      - >
        created_at 无空值，时间范围为 2024-04-01T17:04:57 到 2025-06-29T17:09:33。
      - >
        可用于租户创建时间分析，但不应替代其他事实表中的业务发生时间。

join_keys:
  - column: tenant_id
    references: dim_user.tenant_id
    relationship: one_to_many
    join_condition: dim_tenant.tenant_id = dim_user.tenant_id
    purpose: 将企业画像补充到用户维度。
    risk_level: low
    validation_status: passed
    note: >
      dim_user 覆盖率验证通过，user_row_count = 50000，
      unmatched_user_tenant_count = 0。
      JOIN 后如果统计企业数，应继续使用 COUNT(DISTINCT dim_tenant.tenant_id)。

  - column: tenant_id
    references: fact_subscription.tenant_id
    relationship: one_to_many
    join_condition: dim_tenant.tenant_id = fact_subscription.tenant_id
    purpose: 将企业画像补充到订阅事实。
    risk_level: low
    validation_status: passed
    note: >
      fact_subscription 覆盖率验证通过，subscription_row_count = 343，
      unmatched_subscription_tenant_count = 0。
      JOIN 后如果统计企业数，不能直接 COUNT(*)。

derived_join_paths: {}

field_groups:
  id_columns:
    - tenant_id

  time_columns:
    - created_at

  metric_columns: []

  dimension_columns:
    - name
    - industry
    - size_tier
    - country

  enum_columns:
    - industry
    - size_tier
    - country

  json_columns: []

  text_columns:
    - name

recommended_use_cases:
  - 统计企业数量与企业画像分布
  - 按国家统计企业数
  - 按行业统计企业数
  - 按规模统计企业数
  - 按创建时间统计租户创建趋势
  - 给用户表和订阅表补充企业维度

preferred_metrics:
  tenant_count:
    expression: COUNT(DISTINCT tenant_id)
    meaning: 企业数量
    applicable_grain: 企业级
    note: >
      统计企业实体数量时优先使用此口径。

  tenant_created_count:
    expression: COUNT(DISTINCT tenant_id)
    meaning: 指定时间窗内新创建企业数
    applicable_grain: created_at 时间级
    note: >
      通常结合 created_at 的日期截断使用。

known_traps:
  - trap: >
      统计企业数时在 JOIN fact 表后直接使用 COUNT(*)。
    consequence: >
      JOIN 用户表或订阅表后，COUNT(*) 会变成用户数或订阅数，而不是企业数。
    prevention: >
      统计企业实体时始终使用 COUNT(DISTINCT tenant_id)。

  - trap: >
      将 name 当作主键或稳定 JOIN 键。
    consequence: >
      虽然当前样本中 name 唯一，但它不是正式主键，不应替代 tenant_id。
    prevention: >
      所有唯一标识和稳定 JOIN 都优先使用 tenant_id，不要用 name JOIN。

  - trap: >
      JOIN 用户表或订阅表后继续把 COUNT(*) 解释为企业数量。
    consequence: >
      会把一对多关系放大的记录数误当成企业实体数。
    prevention: >
      在 dim_user 或 fact_subscription 等下游表 JOIN 后，仍用 COUNT(DISTINCT dim_tenant.tenant_id) 统计企业数。

aggregation_notes:
  - >
    dim_tenant 已验证为企业粒度表，COUNT(DISTINCT tenant_id) 可作为标准企业计数口径。
  - >
    按国家、行业、规模聚合时，应以 tenant_id 为企业实体键。
  - >
    按创建时间分析租户趋势时，可基于 created_at 做月份截断。
  - >
    与用户表或订阅表 JOIN 后，应区分“企业数”和“用户数/订阅数”两类指标。

