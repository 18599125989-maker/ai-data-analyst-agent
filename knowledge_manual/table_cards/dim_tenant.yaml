      - >
        country 不是唯一键，只应作为分组维度。

  created_at:
    type: timestamp
    semantic_type: event_time
    business_meaning: >
      企业创建时间。
      可用于租户创建趋势、租户 cohort 和企业成熟度相关分析。
    references: null
    profile:
      null_rate: 0.0
      distinct_count: 500
      distinct_rate: 1.0
      min: "2024-04-01T17:04:57"
      max: "2025-06-29T17:09:33"
      sample_values:
        - "2024-04-01 17:04:57"
        - "2024-04-02 11:26:19"
        - "2024-04-02 14:43:08"
        - "2024-04-04 16:25:47"
