  - fact_subscription_join_coverage
  - sql_pattern_tenant_count_by_country
  - sql_pattern_tenant_count_by_industry
  - sql_pattern_tenant_created_by_month

sql_patterns:
  tenant_count_by_country:
    description: >
      按国家统计企业数。
    sql: |
      SELECT
          country,
          COUNT(DISTINCT tenant_id) AS tenant_count
      FROM dim_tenant
      GROUP BY country
      ORDER BY tenant_count DESC, country;

  tenant_count_by_industry:
    description: >
      按行业统计企业数。
    sql: |
      SELECT
          industry,
          COUNT(DISTINCT tenant_id) AS tenant_count
      FROM dim_tenant
      GROUP BY industry
      ORDER BY tenant_count DESC, industry;

  tenant_created_by_month:
    description: >
      按企业创建月份统计新企业数。
    sql: |
      SELECT
          STRFTIME(DATE_TRUNC('month', created_at), '%Y-%m') AS created_month,
          COUNT(DISTINCT tenant_id) AS tenant_count
      FROM dim_tenant
      GROUP BY created_month
      ORDER BY created_month;

prompt_summary: >
  dim_tenant 是企业客户维度表，一行一个企业，正式主键为 tenant_id。
  name 当前样本中唯一，但只作为候选自然键，不可替代 tenant_id。
  常用 JOIN 路径是 tenant_id 关联 dim_user 和 fact_subscription。
  常用指标是 COUNT(DISTINCT tenant_id)。
  关键陷阱是 JOIN 用户表或订阅表后不能直接 COUNT(*) 当企业数，也不要用 name 做 JOIN。

