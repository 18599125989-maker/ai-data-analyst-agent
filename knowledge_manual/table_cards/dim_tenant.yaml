table_name: dim_tenant
card_version: v1.0
card_type: table_card

domain:
  id: A
  name: 租户与组织

business_meaning: >
  企业客户维度表，描述 CloudWork 中每个 tenant 的基础企业画像信息。
  该表是一切租户级分析的核心维度表，可用于补充企业名称、行业、规模、国家和创建时间。
  当前验证显示该表可作为企业实体统计和企业画像分析的正式维度表使用。

grain: >
  一行 = 一个企业。
  当前验证显示 tenant_id 唯一，row_count = 500，distinct_tenant_id_count = 500，
  因此“一个 tenant 一行”的粒度成立。

primary_key:
  - tenant_id

natural_key_candidate:
  - name

natural_key_status:
  is_unique: true
  tested_key:
    - name
  duplicated_group_count: 0
  note: >
    当前样本中 name 也唯一，distinct_name_count = 500，duplicate_name_count = 0。
    但 name 仍然只应视为候选自然键，不应替代 tenant_id 作为主键、
    稳定 JOIN 键或唯一企业标识。

profile:
  row_count: 500
  column_count: 6
  source_profile_file: outputs/profiles/table_profiles.json
  source_column_profile_file: outputs/profiles/column_profiles.json
  validation_file: outputs/knowledge/validation/dim_tenant_validation.md
  profile_status: validated

columns:
  tenant_id:
    type: string
    semantic_type: primary_key
    business_meaning: >
      企业 ID，数据字典说明格式为 T00001 起。
      当前验证显示该字段可作为 dim_tenant 的正式主键。
    references: null
    profile:
      null_rate: 0.0
      distinct_count: 500
      distinct_rate: 1.0
      min: T00001
      max: T00500
      sample_values:
        - T00001
        - T00002
        - T00003
        - T00004
        - T00005
      is_possible_primary_key: true
    notes:
      - >
        tenant_id 已验证唯一：row_count = 500，distinct_tenant_id_count = 500，
        duplicate_tenant_id_count = 0。
      - >
        统计企业实体数量时应使用 COUNT(DISTINCT tenant_id)。

  name:
    type: string
    semantic_type: dimension
    business_meaning: >
      企业名称，数据字典示例形如 Company_17。
      可用于展示、检索和人工核对企业明细。
    references: null
    profile:
      null_rate: 0.0
      distinct_count: 500
      distinct_rate: 1.0
      min: Company_1
      max: Company_99
      sample_values:
        - Company_1
        - Company_10
        - Company_100
        - Company_101
        - Company_102
      is_possible_primary_key: true
    notes:
      - >
        当前样本中 name 唯一：distinct_name_count = 500，duplicate_name_count = 0。
      - >
        但 name 不作为稳定主键，不建议用 name 替代 tenant_id 做 JOIN 或唯一标识。

  industry:
    type: string
    semantic_type: dimension
    business_meaning: >
      企业所属行业。
      该字段是低基数枚举维度，适合做行业结构和企业画像分析。
    references: null
    profile:
      null_rate: 0.0
      distinct_count: 15
      distinct_rate: 0.03
      min: Consulting
      max: Technology
      sample_values:
        - Government
        - Logistics
        - Legal
        - Consulting
        - Healthcare
        - Hospitality
        - Retail
        - Real Estate
        - Education
        - Finance
        - Nonprofit
        - Energy
        - Media
        - Manufacturing
        - Technology
      is_possible_primary_key: false
    notes:
      - >
        当前验证中的行业枚举分布正常，可作为企业画像维度使用。
      - >
        industry 是维度字段，不是唯一键。

  size_tier:
    type: string
    semantic_type: dimension
    business_meaning: >
      企业规模层级。
      适合做规模分布、企业分层和画像分析。
    references: null
    profile:
      null_rate: 0.0
      distinct_count: 5
      distinct_rate: 0.01
      min: enterprise
      max: startup
      sample_values:
        - startup
        - small
        - medium
        - large
        - enterprise
      is_possible_primary_key: false
    notes:
      - >
        当前验证中的 size_tier 枚举正常：large、medium、startup、small、enterprise。
      - >
        size_tier 是维度字段，不可用于唯一标识企业。

  country:
    type: string
    semantic_type: dimension
    business_meaning: >
      企业国家代码。
      适合做国家分布和区域维度分析。
    references: null
