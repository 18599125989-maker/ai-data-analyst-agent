validation_checks:
  - basic_table_profile
  - column_count
  - primary_key_uniqueness
  - duplicated_primary_key_examples
  - user_id_fk_coverage
  - user_id_fk_unmatched_examples
  - sql_pattern_join_coverage_sample

sql_patterns:
  hash_to_user_mapping_sample: |
    SELECT
        m.user_id_hash,
        m.user_id
    FROM dim_user_id_mapping m
    ORDER BY m.user_id
    LIMIT 50;
  ai_log_to_user_bridge: |
    SELECT
        a.user_id_hash,
        m.user_id
    FROM fact_ai_usage_log a
    JOIN dim_user_id_mapping m
      ON a.user_id_hash = m.user_id_hash
    LIMIT 50;
  ai_log_to_tenant_bridge: |
    SELECT
        a.user_id_hash,
        m.user_id,
        u.tenant_id
    FROM fact_ai_usage_log a
    JOIN dim_user_id_mapping m
      ON a.user_id_hash = m.user_id_hash
    JOIN dim_user u
      ON m.user_id = u.user_id
    LIMIT 50;

prompt_summary: >
  dim_user_id_mapping 是用户哈希 ID 到明文 user_id 的桥接映射表，一行代表一个 user_id_hash 与 user_id 的映射关系。
  当前验证显示主键 user_id 唯一，且 user_id 到 dim_user 的关联覆盖率为 100%。
  该表的主要用途是把 fact_ai_usage_log.user_id_hash 映射到 dim_user.user_id，
  再进一步关联 dim_tenant 等维度。
  关键陷阱是不能直接把 user_id_hash 与 dim_user.user_id JOIN，且 JOIN 行为表后不要把 COUNT(*) 当作用户数。

