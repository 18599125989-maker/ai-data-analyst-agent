sql_patterns:
  feature_count_by_module: |
    SELECT
        module,
        COUNT(DISTINCT feature_key) AS feature_count
    FROM dim_feature
    GROUP BY module
    ORDER BY feature_count DESC, module;
  feature_count_by_category: |
    SELECT
        category,
        COUNT(DISTINCT feature_key) AS feature_count
    FROM dim_feature
    GROUP BY category
    ORDER BY feature_count DESC, category;
  feature_launch_trend: |
    SELECT
        launched_at,
        COUNT(DISTINCT feature_key) AS feature_count
    FROM dim_feature
    GROUP BY launched_at
    ORDER BY launched_at;
  feature_usage_by_feature_key: |
    SELECT
        f.feature_key,
        f.feature_name,
        COUNT(DISTINCT u.user_id) AS active_user_count,
        ROUND(SUM(u.action_count), 2) AS total_action_count,
        ROUND(SUM(u.duration_sec), 2) AS total_duration_sec
    FROM dim_feature f
    JOIN fact_feature_usage u
      ON f.feature_key = u.feature_key
    GROUP BY f.feature_key, f.feature_name
    ORDER BY total_action_count DESC, f.feature_key;

prompt_summary: >
  dim_feature 是产品功能维度表，一行代表一个功能，主键是已验证唯一且无空值的 feature_key。
  feature_key 是稳定功能编码，应作为与 `fact_feature_usage` 等事实表的标准 JOIN key；
  feature_name 仅是展示名称，不建议作为 JOIN key。
  常用分组维度包括 module、category 和 launched_at。
  关键陷阱是不要把 feature_name、module 或 category 当作唯一标识，也不要在 JOIN 使用事实表后把 COUNT(*) 当成功能数量。

