sql_patterns:
  time_distribution: >-
    SELECT
        start_time AS time_key,
        COUNT(*) AS row_count
    FROM fact_session

    GROUP BY start_time

    ORDER BY start_time;
  enum_distribution: >-
    SELECT
        device,
        COUNT(DISTINCT session_id) AS entity_count
    FROM fact_session

    GROUP BY device

    ORDER BY entity_count DESC, device;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM fact_session base

    LEFT JOIN dim_user ref
        ON base.user_id = ref.user_id;
