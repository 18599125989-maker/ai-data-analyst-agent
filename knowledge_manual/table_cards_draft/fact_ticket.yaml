sql_patterns:
  time_distribution: >-
    SELECT
        created_at AS time_key,
        COUNT(*) AS row_count
    FROM fact_ticket

    GROUP BY created_at

    ORDER BY created_at;
  enum_distribution: >-
    SELECT
        category,
        COUNT(DISTINCT ticket_id) AS entity_count
    FROM fact_ticket

    GROUP BY category

    ORDER BY entity_count DESC, category;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM fact_ticket base

    LEFT JOIN dim_tenant ref
        ON base.tenant_id = ref.tenant_id;
