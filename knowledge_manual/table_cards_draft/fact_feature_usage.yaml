known_traps:
- trap: >-
    把数据字典声明的主键直接当作已验证事实。

    当前仍是 draft。
  consequence: 如果当前 DuckDB 数据与字典存在偏差，可能误判粒度或唯一性。
  prevention: 将“`user_id` + `feature_key` + `dt`”只视为数据字典假设，必须以后续 validation 脚本结果为准。
- trap: 把 fact_feature_usage.action_count 与 fact_daily_usage.feature_usage_json 的同名概念当成完全一致口径。
  consequence: 数据字典明确二者口径不同，直接对比可能产生错误解释。
  prevention: 先按业务目标区分“功能明细动作次数”和“日聚合 JSON 摘要口径”。
- trap: >-
    将 COUNT(*) 与 COUNT(DISTINCT 实体键) 混用。

    当前仍是 draft。
  consequence: 在一对多 JOIN 或非唯一粒度表中，可能把记录数误读成实体数。
  prevention: 先依据数据字典粒度说明和 validation 结果确认使用哪个计数口径。
aggregation_notes:
- 数据字典说明该表粒度为：一行 = 一个用户一个功能一天的使用。聚合前必须先验证这一粒度在当前数据中是否成立。
- action_count 的含义来自功能明细口径，不应自动等同于 fact_daily_usage 的 JSON 摘要。
- 当前所有聚合说明都仅基于数据字典，不代表已经通过验证。
