sql_patterns:
  time_distribution: >-
    SELECT
        dt AS time_key,
        COUNT(*) AS row_count
    FROM fact_feature_usage

    GROUP BY dt

    ORDER BY dt;
  enum_distribution: >-
    SELECT
        feature_key,
        COUNT(DISTINCT user_id) AS entity_count
    FROM fact_feature_usage

    GROUP BY feature_key

    ORDER BY entity_count DESC, feature_key;
  metric_trend: >-
    SELECT
        dt AS time_key,
        ROUND(SUM(action_count), 2) AS total_action_count
    FROM fact_feature_usage

    GROUP BY dt

    ORDER BY dt;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM fact_feature_usage base

    LEFT JOIN dim_user ref
        ON base.user_id = ref.user_id;
