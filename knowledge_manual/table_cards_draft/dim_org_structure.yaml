sql_patterns:
  enum_distribution: >-
    SELECT
        node_type,
        COUNT(DISTINCT node_id) AS entity_count
    FROM dim_org_structure

    GROUP BY node_type

    ORDER BY entity_count DESC, node_type;
  metric_by_enum: >-
    SELECT
        node_type,
        ROUND(SUM(level), 2) AS total_level
    FROM dim_org_structure

    GROUP BY node_type

    ORDER BY total_level DESC, node_type;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM dim_org_structure base

    LEFT JOIN dim_tenant ref
        ON base.tenant_id = ref.tenant_id;
