sql_patterns:
  time_distribution: >-
    SELECT
        reached_at AS time_key,
        COUNT(*) AS row_count
    FROM fact_user_activation

    GROUP BY reached_at

    ORDER BY reached_at;
  enum_distribution: >-
    SELECT
        milestone_type,
        COUNT(DISTINCT user_id) AS entity_count
    FROM fact_user_activation

    GROUP BY milestone_type

    ORDER BY entity_count DESC, milestone_type;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM fact_user_activation base

    LEFT JOIN dim_user ref
        ON base.user_id = ref.user_id;
