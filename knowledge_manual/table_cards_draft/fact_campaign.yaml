sql_patterns:
  time_distribution: >-
    SELECT
        start_date AS time_key,
        COUNT(*) AS row_count
    FROM fact_campaign

    GROUP BY start_date

    ORDER BY start_date;
  enum_distribution: >-
    SELECT
        channel,
        COUNT(DISTINCT campaign_id) AS entity_count
    FROM fact_campaign

    GROUP BY channel

    ORDER BY entity_count DESC, channel;
  metric_trend: >-
    SELECT
        start_date AS time_key,
        ROUND(SUM(budget), 2) AS total_budget
    FROM fact_campaign

    GROUP BY start_date

    ORDER BY start_date;
