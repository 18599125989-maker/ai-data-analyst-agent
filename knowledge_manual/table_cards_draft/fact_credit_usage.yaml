sql_patterns:
  time_distribution: >-
    SELECT
        dt AS time_key,
        COUNT(*) AS row_count
    FROM fact_credit_usage

    GROUP BY dt

    ORDER BY dt;
  enum_distribution: >-
    SELECT
        resource_type,
        COUNT(DISTINCT usage_id) AS entity_count
    FROM fact_credit_usage

    GROUP BY resource_type

    ORDER BY entity_count DESC, resource_type;
  metric_trend: >-
    SELECT
        dt AS time_key,
        ROUND(SUM(quantity), 2) AS total_quantity
    FROM fact_credit_usage

    GROUP BY dt

    ORDER BY dt;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM fact_credit_usage base

    LEFT JOIN dim_tenant ref
        ON base.tenant_id = ref.tenant_id;
