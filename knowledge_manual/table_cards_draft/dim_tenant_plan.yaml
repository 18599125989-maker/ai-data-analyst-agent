sql_patterns:
  time_distribution: >-
    SELECT
        effective_from AS time_key,
        COUNT(*) AS row_count
    FROM dim_tenant_plan

    GROUP BY effective_from

    ORDER BY effective_from;
  enum_distribution: >-
    SELECT
        plan_name,
        COUNT(DISTINCT tenant_id) AS entity_count
    FROM dim_tenant_plan

    GROUP BY plan_name

    ORDER BY entity_count DESC, plan_name;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM dim_tenant_plan base

    LEFT JOIN dim_tenant ref
        ON base.tenant_id = ref.tenant_id;
