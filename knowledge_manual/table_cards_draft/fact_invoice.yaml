sql_patterns:
  time_distribution: >-
    SELECT
        issued_at AS time_key,
        COUNT(*) AS row_count
    FROM fact_invoice

    GROUP BY issued_at

    ORDER BY issued_at;
  enum_distribution: >-
    SELECT
        currency,
        COUNT(DISTINCT invoice_id) AS entity_count
    FROM fact_invoice

    GROUP BY currency

    ORDER BY entity_count DESC, currency;
  metric_trend: >-
    SELECT
        issued_at AS time_key,
        ROUND(SUM(amount), 2) AS total_amount
    FROM fact_invoice

    GROUP BY issued_at

    ORDER BY issued_at;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM fact_invoice base

    LEFT JOIN dim_tenant ref
        ON base.tenant_id = ref.tenant_id;
