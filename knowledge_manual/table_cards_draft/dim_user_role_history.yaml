sql_patterns:
  time_distribution: >-
    SELECT
        changed_at AS time_key,
        COUNT(*) AS row_count
    FROM dim_user_role_history

    GROUP BY changed_at

    ORDER BY changed_at;
  enum_distribution: >-
    SELECT
        old_role,
        COUNT(DISTINCT user_id) AS entity_count
    FROM dim_user_role_history

    GROUP BY old_role

    ORDER BY entity_count DESC, old_role;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM dim_user_role_history base

    LEFT JOIN dim_user ref
        ON base.user_id = ref.user_id;
