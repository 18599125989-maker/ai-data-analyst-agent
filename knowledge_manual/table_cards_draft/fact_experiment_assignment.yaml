sql_patterns:
  time_distribution: >-
    SELECT
        assigned_at AS time_key,
        COUNT(*) AS row_count
    FROM fact_experiment_assignment

    GROUP BY assigned_at

    ORDER BY assigned_at;
  enum_distribution: >-
    SELECT
        variant,
        COUNT(DISTINCT user_id) AS entity_count
    FROM fact_experiment_assignment

    GROUP BY variant

    ORDER BY entity_count DESC, variant;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM fact_experiment_assignment base

    LEFT JOIN dim_user ref
        ON base.user_id = ref.user_id;
