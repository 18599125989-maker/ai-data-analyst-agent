sql_patterns:
  enum_distribution: >-
    SELECT
        page_path,
        COUNT(DISTINCT pv_id) AS entity_count
    FROM fact_page_view

    GROUP BY page_path

    ORDER BY entity_count DESC, page_path;
  metric_by_enum: >-
    SELECT
        page_path,
        ROUND(SUM(view_duration_ms), 2) AS total_view_duration_ms
    FROM fact_page_view

    GROUP BY page_path

    ORDER BY total_view_duration_ms DESC, page_path;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM fact_page_view base

    LEFT JOIN fact_session ref
        ON base.session_id = ref.session_id;
