sql_patterns:
  time_distribution: >-
    SELECT
        replied_at AS time_key,
        COUNT(*) AS row_count
    FROM fact_ticket_reply

    GROUP BY replied_at

    ORDER BY replied_at;
  enum_distribution: >-
    SELECT
        author_type,
        COUNT(DISTINCT reply_id) AS entity_count
    FROM fact_ticket_reply

    GROUP BY author_type

    ORDER BY entity_count DESC, author_type;
  metric_trend: >-
    SELECT
        replied_at AS time_key,
        ROUND(SUM(content_length), 2) AS total_content_length
    FROM fact_ticket_reply

    GROUP BY replied_at

    ORDER BY replied_at;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM fact_ticket_reply base

    LEFT JOIN fact_ticket ref
        ON base.ticket_id = ref.ticket_id;
