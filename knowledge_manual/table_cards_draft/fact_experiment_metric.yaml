sql_patterns:
  time_distribution: >-
    SELECT
        dt AS time_key,
        COUNT(*) AS row_count
    FROM fact_experiment_metric

    GROUP BY dt

    ORDER BY dt;
  enum_distribution: >-
    SELECT
        variant,
        COUNT(DISTINCT exp_id) AS entity_count
    FROM fact_experiment_metric

    GROUP BY variant

    ORDER BY entity_count DESC, variant;
  metric_trend: >-
    SELECT
        dt AS time_key,
        ROUND(SUM(sample_size), 2) AS total_sample_size
    FROM fact_experiment_metric

    GROUP BY dt

    ORDER BY dt;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM fact_experiment_metric base

    LEFT JOIN fact_experiment ref
        ON base.exp_id = ref.exp_id;
