sql_patterns:
  enum_distribution: >-
    SELECT
        language,
        COUNT(DISTINCT user_id) AS entity_count
    FROM dim_user_profile

    GROUP BY language

    ORDER BY entity_count DESC, language;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM dim_user_profile base

    LEFT JOIN dim_user ref
        ON base.user_id = ref.user_id;
