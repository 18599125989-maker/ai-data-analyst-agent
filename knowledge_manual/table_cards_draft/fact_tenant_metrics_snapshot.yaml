sql_patterns:
  time_distribution: >-
    SELECT
        snapshot_date AS time_key,
        COUNT(*) AS row_count
    FROM fact_tenant_metrics_snapshot

    GROUP BY snapshot_date

    ORDER BY snapshot_date;
  metric_trend: >-
    SELECT
        snapshot_date AS time_key,
        ROUND(SUM(total_users), 2) AS total_total_users
    FROM fact_tenant_metrics_snapshot

    GROUP BY snapshot_date

    ORDER BY snapshot_date;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM fact_tenant_metrics_snapshot base

    LEFT JOIN dim_tenant ref
        ON base.tenant_id = ref.tenant_id;
