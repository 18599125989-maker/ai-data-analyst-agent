known_traps:
- trap: >-
    把数据字典声明的主键直接当作已验证事实。

    当前仍是 draft。
  consequence: 如果当前 DuckDB 数据与字典存在偏差，可能误判粒度或唯一性。
  prevention: 将“`tenant_id` + `snapshot_date`”只视为数据字典假设，必须以后续 validation 脚本结果为准。
- trap: 把 total_* 累计值误当成当日增量。
  consequence: 会把生命周期累计指标误解为单日变化。
  prevention: 数据字典明确 total_* 为累计口径；如需新增或环比，应先做差分。
- trap: >-
    将 COUNT(*) 与 COUNT(DISTINCT 实体键) 混用。

    当前仍是 draft。
  consequence: 在一对多 JOIN 或非唯一粒度表中，可能把记录数误读成实体数。
  prevention: 先依据数据字典粒度说明和 validation 结果确认使用哪个计数口径。
