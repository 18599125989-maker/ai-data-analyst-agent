- 数据字典说明该表粒度为：一行 = 一个租户在某一天的指标快照（采样频率不固定，多数为日度，部分为周度）。聚合前必须先验证这一粒度在当前数据中是否成立。
- 数据字典特别说明：注：`total_*` 字段均为累计值，如需"当日新增"或"周环比"需自行做差分。
- 如需“当日新增”或“周环比”，数据字典明确应基于累计指标自行做差分。
- 当前所有聚合说明都仅基于数据字典，不代表已经通过验证。
