sql_patterns:
  enum_distribution: >-
    SELECT
        feature_key,
        COUNT(DISTINCT tenant_id) AS entity_count
    FROM dim_tenant_config

    GROUP BY feature_key

    ORDER BY entity_count DESC, feature_key;
  metric_by_enum: >-
    SELECT
        feature_key,
        ROUND(SUM(enabled), 2) AS total_enabled
    FROM dim_tenant_config

    GROUP BY feature_key

    ORDER BY total_enabled DESC, feature_key;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM dim_tenant_config base

    LEFT JOIN dim_tenant ref
        ON base.tenant_id = ref.tenant_id;
