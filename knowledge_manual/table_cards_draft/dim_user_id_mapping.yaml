known_traps:
- trap: >-
    把数据字典声明的主键直接当作已验证事实。

    当前仍是 draft。
  consequence: 如果当前 DuckDB 数据与字典存在偏差，可能误判粒度或唯一性。
  prevention: 将“`user_id`”只视为数据字典假设，必须以后续 validation 脚本结果为准。
- trap: 直接把 fact_ai_usage_log.user_id_hash 与 dim_user.user_id JOIN。
  consequence: 数据字典明确 AI 日志使用哈希 ID，直接 JOIN 会错配。
  prevention: 必须先通过 dim_user_id_mapping 做桥接，再关联 dim_user。
- trap: >-
    将 COUNT(*) 与 COUNT(DISTINCT 实体键) 混用。

    当前仍是 draft。
  consequence: 在一对多 JOIN 或非唯一粒度表中，可能把记录数误读成实体数。
  prevention: 先依据数据字典粒度说明和 validation 结果确认使用哪个计数口径。
