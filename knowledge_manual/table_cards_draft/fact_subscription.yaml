preferred_metrics:
  subscription_count:
    expression: COUNT(DISTINCT sub_id)
    meaning: 订阅数量
    applicable_grain: 订阅级
    note: >
      统计订阅实体数时使用。
  active_subscription_count:
    expression: >
      COUNT(
        DISTINCT CASE
          WHEN status = 'active' THEN sub_id
        END
      )
    meaning: 当前状态为 active 的订阅数量
    applicable_grain: 订阅级
    note: >
      若分析某个月是否有效，建议再叠加 start_date 和 end_date 条件。
  total_mrr:
    expression: SUM(mrr)
    meaning: MRR 合计
    applicable_grain: 订阅聚合级
    note: >
      这是订阅口径的名义月收入，不等于实收收入。
known_traps:
- trap: >-
    把数据字典声明的主键直接当作已验证事实。

    当前仍是 draft。
  consequence: 如果当前 DuckDB 数据与字典存在偏差，可能误判粒度或唯一性。
  prevention: 将“`sub_id`”只视为数据字典假设，必须以后续 validation 脚本结果为准。
- trap: 仅根据 status 判断某月有效订阅，而忽略时间区间。
  consequence: 会得到错误的月度活跃订阅口径。
  prevention: 数据字典明确完整月份筛选要结合 start_date 与 end_date。
- trap: >-
    将 COUNT(*) 与 COUNT(DISTINCT 实体键) 混用。

    当前仍是 draft。
  consequence: 在一对多 JOIN 或非唯一粒度表中，可能把记录数误读成实体数。
  prevention: 先依据数据字典粒度说明和 validation 结果确认使用哪个计数口径。
