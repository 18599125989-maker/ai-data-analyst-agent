sql_patterns:
  time_distribution: >-
    SELECT
        touch_at AS time_key,
        COUNT(*) AS row_count
    FROM fact_campaign_attribution

    GROUP BY touch_at

    ORDER BY touch_at;
  enum_distribution: >-
    SELECT
        touch_type,
        COUNT(DISTINCT user_id) AS entity_count
    FROM fact_campaign_attribution

    GROUP BY touch_type

    ORDER BY entity_count DESC, touch_type;
  metric_trend: >-
    SELECT
        touch_at AS time_key,
        ROUND(SUM(is_converted), 2) AS total_is_converted
    FROM fact_campaign_attribution

    GROUP BY touch_at

    ORDER BY touch_at;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM fact_campaign_attribution base

    LEFT JOIN dim_user ref
        ON base.user_id = ref.user_id;
