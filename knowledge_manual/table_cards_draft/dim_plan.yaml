sql_patterns:
  plan_price_table:
    description: >
      展示套餐价格和席位限制。
    sql: >
      SELECT
          plan_tier,
          plan_name,
          monthly_price,
          annual_price,
          seat_limit
      FROM dim_plan

      ORDER BY monthly_price, plan_tier;
  subscription_count_by_plan:
    description: >
      统计每个套餐对应的订阅数。
    sql: >
      SELECT
          p.plan_tier,
          p.plan_name,
          COUNT(DISTINCT s.sub_id) AS subscription_count
      FROM dim_plan p

      LEFT JOIN fact_subscription s
          ON p.plan_tier = s.plan_tier
      GROUP BY p.plan_tier, p.plan_name

      ORDER BY subscription_count DESC, p.plan_tier;
  mrr_by_plan:
    description: >
      统计每个套餐的订阅 MRR。
    sql: >
      SELECT
          p.plan_tier,
          p.plan_name,
          SUM(s.mrr) AS total_mrr
      FROM dim_plan p

      LEFT JOIN fact_subscription s
          ON p.plan_tier = s.plan_tier
      GROUP BY p.plan_tier, p.plan_name

      ORDER BY total_mrr DESC NULLS LAST, p.plan_tier;
