known_traps:
- trap: >-
    把数据字典声明的主键直接当作已验证事实。

    当前仍是 draft。
  consequence: 如果当前 DuckDB 数据与字典存在偏差，可能误判粒度或唯一性。
  prevention: 将“`survey_id`”只视为数据字典假设，必须以后续 validation 脚本结果为准。
- trap: 忽略数据字典中对空字符串、N/A 或混合类型的特别说明。
  consequence: 可能把“当前仍有效”“未完成调研”或“缺失值”误当成普通值。
  prevention: 先按数据字典说明理解异常取值语义，再用验证脚本检查实际分布。
- trap: 将 fact_nps_survey.plan_tier 与 dim_plan.plan_tier 直接按原值 JOIN。
  consequence: 数据字典明确两表大小写写法不同，直接 JOIN 可能全部失配。
  prevention: 先做字符串标准化假设，再用验证脚本确认可用 JOIN 规则。
- trap: 将 fact_nps_survey.role 的整数编码与 dim_user.role 的字符串角色直接比较。
  consequence: 数据字典明确两者编码方式不同，直接比较会得到错误结论。
  prevention: 先按数据字典说明做编码映射假设，验证后再跨表比较。
- trap: >-
    将 COUNT(*) 与 COUNT(DISTINCT 实体键) 混用。

    当前仍是 draft。
  consequence: 在一对多 JOIN 或非唯一粒度表中，可能把记录数误读成实体数。
  prevention: 先依据数据字典粒度说明和 validation 结果确认使用哪个计数口径。
