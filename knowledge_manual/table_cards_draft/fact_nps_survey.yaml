sql_patterns:
  time_distribution: >-
    SELECT
        survey_date AS time_key,
        COUNT(*) AS row_count
    FROM fact_nps_survey

    GROUP BY survey_date

    ORDER BY survey_date;
  enum_distribution: >-
    SELECT
        score,
        COUNT(DISTINCT survey_id) AS entity_count
    FROM fact_nps_survey

    GROUP BY score

    ORDER BY entity_count DESC, score;
  metric_trend: >-
    SELECT
        survey_date AS time_key,
        ROUND(SUM(role), 2) AS total_role
    FROM fact_nps_survey

    GROUP BY survey_date

    ORDER BY survey_date;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM fact_nps_survey base

    LEFT JOIN dim_user ref
        ON base.user_id = ref.user_id;
