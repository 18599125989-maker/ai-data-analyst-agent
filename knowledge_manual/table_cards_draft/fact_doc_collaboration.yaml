sql_patterns:
  time_distribution: >-
    SELECT
        dt AS time_key,
        COUNT(*) AS row_count
    FROM fact_doc_collaboration

    GROUP BY dt

    ORDER BY dt;
  metric_trend: >-
    SELECT
        dt AS time_key,
        ROUND(SUM(edit_duration_sec), 2) AS total_edit_duration_sec
    FROM fact_doc_collaboration

    GROUP BY dt

    ORDER BY dt;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM fact_doc_collaboration base

    LEFT JOIN fact_document ref
        ON base.doc_id = ref.doc_id;
