sql_patterns:
  time_distribution: >-
    SELECT
        created_at AS time_key,
        COUNT(*) AS row_count
    FROM fact_document

    GROUP BY created_at

    ORDER BY created_at;
  enum_distribution: >-
    SELECT
        doc_type,
        COUNT(DISTINCT doc_id) AS entity_count
    FROM fact_document

    GROUP BY doc_type

    ORDER BY entity_count DESC, doc_type;
  metric_trend: >-
    SELECT
        created_at AS time_key,
        ROUND(SUM(edit_count), 2) AS total_edit_count
    FROM fact_document

    GROUP BY created_at

    ORDER BY created_at;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM fact_document base

    LEFT JOIN dim_tenant ref
        ON base.tenant_id = ref.tenant_id;
