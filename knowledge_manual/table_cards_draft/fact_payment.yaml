sql_patterns:
  time_distribution: >-
    SELECT
        paid_at AS time_key,
        COUNT(*) AS row_count
    FROM fact_payment

    GROUP BY paid_at

    ORDER BY paid_at;
  enum_distribution: >-
    SELECT
        method,
        COUNT(DISTINCT payment_id) AS entity_count
    FROM fact_payment

    GROUP BY method

    ORDER BY entity_count DESC, method;
  metric_trend: >-
    SELECT
        paid_at AS time_key,
        ROUND(SUM(amount), 2) AS total_amount
    FROM fact_payment

    GROUP BY paid_at

    ORDER BY paid_at;
  join_coverage_sample: >-
    SELECT
        COUNT(*) AS row_count
    FROM fact_payment base

    LEFT JOIN fact_invoice ref
        ON base.invoice_id = ref.invoice_id;
